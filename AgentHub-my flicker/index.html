<script>
  // 配置 marked：代码块用 hljs 高亮，支持 GFM（表格、删除线等）
  if (typeof marked !== 'undefined') {
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          try { return hljs.highlight(code, {language: lang}).value; } catch(e) {}
        }
        try { return hljs.highlightAuto(code).value; } catch(e) {}
        return code;
      },
      breaks: true,      // GFM 换行符转为 <br>
      gfm: true,
    });
  }
</script>

<style>
  body { font-family: 'Inter', -apple-system, 'PingFang SC', 'Source Han Sans', sans-serif; background:#FAFAF9; color:#1A1A1A; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background:#e5e5e4; border-radius:10px; }
  ::-webkit-scrollbar-thumb:hover { background:#dadad9; }
  .no-scrollbar::-webkit-scrollbar { display:none; }
  .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

  .editor-border { border-left: 4px solid #E96A3C; }
  .diff-bg-removed { background-color: rgba(186, 26, 26, 0.10); }
  .diff-text-removed { color:#ba1a1a; text-decoration: line-through; }
  .diff-bg-added { background-color: rgba(0, 101, 119, 0.10); }
  .diff-text-added { color:#006577; }
  .read-only-overlay {
    background-image: repeating-linear-gradient(45deg, #f3f4f3 25%, transparent 25%, transparent 50%, #f3f4f3 50%, #f3f4f3 75%, transparent 75%, transparent);
    background-size: 40px 40px; opacity: 0.03;
  }
  .agent-connector { position: relative; }
  .agent-connector::before {
    content:''; position:absolute; left:20px; top:40px; bottom:-24px; width:2px;
    background: repeating-linear-gradient(to bottom, #E5E5E4 0, #E5E5E4 4px, transparent 4px, transparent 8px);
  }
  .agent-connector-last::before { display:none; }

  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(233,106,60,0.5); }
    100% { box-shadow: 0 0 0 8px rgba(233,106,60,0); }
  }
  .agent-pending { animation: pulseRing 1.2s ease-out 2; border-color:#E96A3C !important; }

  .skill-switch:checked + .switch-bg { background-color:#a3380b; }
  .skill-switch:checked + .switch-bg .switch-dot { transform: translateX(14px); }

  .modal-overlay { background-color: rgba(26,28,28,0.40); backdrop-filter: blur(2px); }
  .mention-chip { display:inline-block; padding:1px 6px; border-radius:4px; background:#ffdbcf; color:#832700; font-weight:500; }

  .mission-card-shadow:hover { box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .hidden { display:none !important; }

  /* 消息气泡 hover 操作按钮 */
  .message-bubble-wrap { position: relative; }
  .message-actions {
    position: absolute;
    bottom: -28px;
    left: 0;
    display: none;
    gap: 2px;
    z-index: 10;
    background: rgba(255,255,255,0.95);
    border: 1px solid #e2e2e2;
    border-radius: 6px;
    padding: 2px 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .message-bubble-wrap:hover .message-actions { display: flex; }
  .message-actions-right {
    left: auto;
    right: 0;
  }
  .message-action-btn {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    color: #5f5e5e;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .message-action-btn:hover { background: #eeeeed; color: #a3380b; }
  .message-action-btn .material-symbols-outlined { font-size: 14px; }
  /* 打字机光标动画 */
  @keyframes blink-cursor {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  .typing-cursor {
    animation: blink-cursor 0.8s step-end infinite;
    color: #a3380b;
    font-weight: 300;
    margin-left: 1px;
  }

  /* 打字机光标动画 */
  @keyframes blink-cursor {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  .typing-cursor {
    animation: blink-cursor 0.8s step-end infinite;
    color: #a3380b;
    font-weight: 300;
    margin-left: 1px;
  }

  .thinking-pulse {
    animation: thinking-pulse 1.5s ease-in-out infinite;
  }
  @keyframes thinking-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* 追问气泡样式（Agent 反问机制） */
  .clarification-box {
    background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
    border: 1px solid #ffc107;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 0.82rem;
  }
  .clarification-box::before {
    content: '💬 请确认以下信息：';
    display: block;
    font-weight: 600;
    color: #8a5a00;
    margin-bottom: 6px;
    font-size: 0.8rem;
  }
  .clarification-box ol {
    margin: 0;
    padding-left: 20px;
    color: #6d4c00;
  }
  .clarification-box li {
    margin-bottom: 4px;
  }
  .clarification-divider {
    border: none;
    border-top: 1px dashed #ffc107;
    margin: 8px 0;
  }

  /* Markdown body styling for agent messages */
  .markdown-body {
    font-size: 0.875rem;
    line-height: 1.6;
    color: var(--on-surface, #1c1b1b);
  }
  .markdown-body h1, .markdown-body h2, .markdown-body h3,
  .markdown-body h4, .markdown-body h5, .markdown-body h6 {
    font-weight: 600;
    margin: 0.75em 0 0.4em;
    line-height: 1.3;
    color: var(--on-surface, #1c1b1b);
  }
  .markdown-body h1 { font-size: 1.25rem; }
  .markdown-body h2 { font-size: 1.1rem; }
  .markdown-body h3 { font-size: 1rem; }
  .markdown-body p { margin: 0.5em 0; }
  .markdown-body ul, .markdown-body ol {
    padding-left: 1.5em;
    margin: 0.5em 0;
  }
  .markdown-body li { margin: 0.2em 0; }
  .markdown-body blockquote {
    border-left: 3px solid var(--primary, #a3380b);
    margin: 0.5em 0;
    padding: 0.25em 0.75em;
    color: #636262;
    background: rgba(163,56,11,0.05);
    border-radius: 0 4px 4px 0;
  }
  .markdown-body code {
    background: rgba(0,0,0,0.06);
    padding: 0.1em 0.3em;
    border-radius: 3px;
    font-size: 0.85em;
    font-family: 'Fira Code', 'Consolas', monospace;
  }
  .markdown-body pre {
    background: #f6f8fa;
    border-radius: 8px;
    padding: 0.75em 1em;
    overflow-x: auto;
    margin: 0.5em 0;
    border: 1px solid #e1e4e8;
  }
  .markdown-body pre code {
    background: transparent;
    padding: 0;
    font-size: 0.8rem;
    color: inherit;
  }
  .markdown-body table {
    border-collapse: collapse;
    width: 100%;
    margin: 0.5em 0;
    font-size: 0.85rem;
  }
  .markdown-body table th, .markdown-body table td {
    border: 1px solid #e5e2e1;
    padding: 0.3em 0.6em;
    text-align: left;
  }
  .markdown-body table th { background: rgba(0,0,0,0.04); font-weight: 600; }
  .markdown-body img {
    max-width: 100%;
    border-radius: 6px;
    margin: 0.5em 0;
  }
  .markdown-body hr {
    border: none;
    border-top: 1px solid #e5e2e1;
    margin: 0.75em 0;
  }
  .markdown-body a { color: #a3380b; text-decoration: none; }
  .markdown-body a:hover { text-decoration: underline; }
  .markdown-body strong { font-weight: 600; }
  .markdown-body em { font-style: italic; }

  /* ===== Diff 渲染样式 ===== */
  .diff-view { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; line-height: 1.6; }
  .diff-header { color: #6b7280; font-weight: 600; display: block; padding: 2px 0; }
  .diff-hunk { color: #8b5cf6; display: block; padding: 2px 0; background: rgba(139, 92, 246, 0.06); }
  .diff-add { color: #065f46; display: block; padding: 1px 0; background: rgba(6, 95, 70, 0.08); }
  .diff-del { color: #991b1b; display: block; padding: 1px 0; background: rgba(153, 27, 27, 0.06); }

  /* ===== Mermaid 图表容器 ===== */
  .mermaid-diagram { display: flex; justify-content: center; }
  .mermaid-diagram svg { max-width: 100%; height: auto; }

  /* ===== Markdown 表格排序 ===== */
  .markdown-body table th { user-select: none; position: relative; }
  .markdown-body table th:hover { background: rgba(0,0,0,0.04); }
  .markdown-body table th::after { content: ' ↕'; font-size: 10px; opacity: 0.3; margin-left: 4px; }
</style>
</head>
