async function commitAgentSave() {
  const a = getCurrentAgent();
  if (!a || !state.detail || !state.detail.dirty) return;
  ensureAgentSchema(a);
  const draft = state.detail.draft;

  // ===== Backend 自定义 Agent：通过 API 持久化 =====
  if (state.detail.source === 'backend') {
    if (!(draft.name || '').trim()) {
      showToast('名称不能为空', 'error');
      return;
    }
    try {
      const agentId = state.detail.agentId;
      await api(`/agents/${agentId}`, {
        method: 'PUT',
        body: JSON.stringify(detailDraftToBackendPayload(draft))
      });
      state.detail.dirty = false;
      showToast('已保存', 'success');
      await fetchCustomAgents();
      render();
    } catch (e) {
      showToast(`保存失败: ${e.message || e}`, 'error');
    }
    return;
  }

  // ===== Mine / Market：原有内存版本机制不变 =====
  // 全字段快照写入版本（保存前的旧值）
  a.versions = a.versions || [];
  a.versions.push({
    ts: new Date().toISOString().replace('T',' ').slice(0,19),
    by: state.user ? state.user.username : 'guest',
    snapshot: {
      name:a.name, role:a.role, icon:a.icon, model:a.model, kind:a.kind||'agent',
      systemPrompt:a.systemPrompt,
      skills:[...(a.skills||[])],
      mcpTools:[...(a.mcpTools||[])],
      teamMemberIds:[...(a.teamMemberIds||[])],
      memoryConfig: JSON.parse(JSON.stringify(a.memoryConfig||{})),
      planningConfig: JSON.parse(JSON.stringify(a.planningConfig||{})),
      validationConfig: JSON.parse(JSON.stringify(a.validationConfig||{})),
      hooks: JSON.parse(JSON.stringify(a.hooks||{})),
      readme:a.readme||'',
    },
    note: 'before_edit',
  });
  if (a.versions.length > 50) a.versions = a.versions.slice(-50);
  // 应用 draft（kind 不从 draft 写回：Kind 创建后不可修改）
  a.name = draft.name; a.role = draft.role; a.icon = draft.icon; a.model = draft.model;
  // a.kind 保持不变
  a.systemPrompt = draft.systemPrompt;
  a.skills = [...draft.skills];
  a.mcpTools = [...draft.mcpTools];
  a.teamMemberIds = [...(draft.teamMemberIds||[])];
  a.memoryConfig = JSON.parse(JSON.stringify(draft.memoryConfig));
  a.planningConfig = JSON.parse(JSON.stringify(draft.planningConfig));
  a.validationConfig = JSON.parse(JSON.stringify(draft.validationConfig));
  a.hooks = JSON.parse(JSON.stringify(draft.hooks));
  a.readme = draft.readme;
  a.updatedAt = Date.now();
  // ensureMissionManager 仅作为防御性兑现（创建控制了唯一性，这里不会变更 kind）
  const m2 = state.missions.find(x => x.id === state.detail.missionId);
  if (m2 && typeof ensureMissionManager === 'function') ensureMissionManager(m2);
  state.detail.dirty = false;
  showToast('已保存（共 ' + a.versions.length + ' 个版本）', 'success');
  render();
}

function showAgentVersionDiff(idx) {
  const a = getCurrentAgent();
  if (!a || !a.versions[idx]) return;
  const snap = a.versions[idx].snapshot;
  const cur = { name:a.name, role:a.role, icon:a.icon, model:a.model, systemPrompt:a.systemPrompt, skills:[...a.skills], readme:a.readme||'' };
  showVersionDiffModal(snap, cur, idx, () => rollbackAgentVersion(idx));
}

function rollbackAgentVersion(idx) {
  const a = getCurrentAgent();
  if (!a || !a.versions[idx]) return;
  ensureAgentSchema(a);
  const snap = a.versions[idx].snapshot;
  // 把当前状态先存档
  a.versions.push({
    ts: new Date().toISOString().replace('T',' ').slice(0,19),
    by: state.user ? state.user.username : 'guest',
    snapshot: {
      name:a.name, role:a.role, icon:a.icon, model:a.model, kind:a.kind||'agent',
      systemPrompt:a.systemPrompt,
      skills:[...(a.skills||[])],
      mcpTools:[...(a.mcpTools||[])],
      teamMemberIds:[...(a.teamMemberIds||[])],
      memoryConfig: JSON.parse(JSON.stringify(a.memoryConfig||{})),
      planningConfig: JSON.parse(JSON.stringify(a.planningConfig||{})),
      validationConfig: JSON.parse(JSON.stringify(a.validationConfig||{})),
      hooks: JSON.parse(JSON.stringify(a.hooks||{})),
      readme:a.readme||'',
    },
    note: `rollback_from:v${idx+1}`,
  });
  Object.assign(a, {
    name: snap.name, role: snap.role, icon: snap.icon, model: snap.model,
    kind: snap.kind || 'agent',
    systemPrompt: snap.systemPrompt,
    skills: [...(snap.skills||[])],
    mcpTools: [...(snap.mcpTools||[])],
    teamMemberIds: [...((snap.teamMemberIds||snap.subAgentIds)||[])],
    memoryConfig: snap.memoryConfig ? JSON.parse(JSON.stringify(snap.memoryConfig)) : a.memoryConfig,
    planningConfig: snap.planningConfig ? JSON.parse(JSON.stringify(snap.planningConfig)) : a.planningConfig,
    validationConfig: snap.validationConfig ? JSON.parse(JSON.stringify(snap.validationConfig)) : a.validationConfig,
    hooks: snap.hooks ? JSON.parse(JSON.stringify(snap.hooks)) : a.hooks,
    readme: snap.readme || '',
    updatedAt: Date.now(),
  });
  // 同步 draft
  state.detail.draft = cloneAgentForDraft(a);
  state.detail.dirty = false;
  closeVersionDiffModal();
  showToast(`已回滚到 v${idx+1}`, 'success');
  render();
}

  if (!state.user) { showToast('请先登录'); openAuthModal && openAuthModal('register'); return; }
  const d = state.detail;
  if (!d || d.type !== 'skill' || !d.dirty) return;
  const draft = d.draft;
  const s = d.snapshot;

  if (!s.isMine) {
    // Fork 流程
    if (!confirm(`这不是你创建的 Skill。\n保存将为你创建一个副本到「我的 Skill」。是否继续？`)) return;
    try {
      const r = await api('/skills/' + s.id + '/fork', {
        method: 'POST',
        body: JSON.stringify({
          name: draft.name, icon: draft.icon, description: draft.description,
          code: draft.code, readme: draft.readme, category: draft.category,
        }),
      });
      showToast(`已创建副本：${r.skill.slug}`, 'success');
      await loadSkills();
      // 跳到新副本详情
      d.dirty = false;
      openSkillDetail(r.skill.id);
    } catch (e) {
      showToast('Fork 失败：' + (e.message||e));
    }
    return;
  }

  // 我自己的 → PUT 直接更新（后端会写 versions）
  try {
    const r = await api('/skills/' + s.id, {
      method: 'PUT',
      body: JSON.stringify({
        name: draft.name, icon: draft.icon, description: draft.description,
        code: draft.code, readme: draft.readme, category: draft.category,
      }),
    });
    d.snapshot = r.skill;
    d.draft = cloneSkillForDraft(r.skill);
    d.dirty = false;
    await loadSkills();
    showToast('已保存（版本 ' + (r.skill.versions||[]).length + '）', 'success');
    render();
  } catch (e) {
    showToast('保存失败：' + (e.message||e));
  }
}

function showSkillVersionDiff(idx) {
  const d = state.detail; if (!d) return;
  const versions = d.snapshot.versions || [];
  if (!versions[idx]) return;
  const snap = versions[idx].snapshot;
  const cur = { name:d.snapshot.name, icon:d.snapshot.icon, description:d.snapshot.description, code:d.snapshot.code, readme:d.snapshot.readme, category:d.snapshot.category };
  showVersionDiffModal(snap, cur, idx, () => rollbackSkillVersion(idx));
}

async function rollbackSkillVersion(idx) {
  const d = state.detail; if (!d || !d.snapshot.isMine) return showToast('只能回滚自己创建的 Skill');
  if (!confirm(`确定回滚到 v${idx+1} ？当前内容会写入新的历史版本。`)) return;
  try {
    const r = await api('/skills/' + d.snapshot.id + '/rollback', {
      method:'POST',
      body: JSON.stringify({ versionIndex: idx }),
    });
    d.snapshot = r.skill;
    d.draft = cloneSkillForDraft(r.skill);
    d.dirty = false;
    closeVersionDiffModal();
    await loadSkills();
    showToast(`已回滚到 v${idx+1}`, 'success');
    render();
  } catch (e) {
    showToast('回滚失败：' + (e.message||e));
  }
}

/* ============================================================
   知识库（Knowledge Base / RAG）— 纯前端实现
   ============================================================
   d11: 文件解析（pdf/docx/xlsx/md/txt/csv/json）
   d12: 切分 + token + 简版 TF-IDF 检索 + 关键词高亮
   d13: state.kbs / state.kbDetail + localStorage 持久化
============================================================ */

const KB_MAX_FILE_SIZE = 5 * 1024 * 1024;   // 5MB
const KB_MAX_CHUNKS_PER_DOC = 200;
const KB_CHUNK_SIZE = 500;
const KB_LS_PREFIX = 'agenthub.kbs.v1.';

/* ---- d11: 文件解析 ---- */

async function parseFileToText(file) {
  const name = file.name || '';
  const ext = (name.split('.').pop() || '').toLowerCase();
  const size = file.size;
  // 大小硬限制
  if (size > KB_MAX_FILE_SIZE) {
    return { error: `文件 "${name}" 大小 ${(size/1024/1024).toFixed(2)}MB，超过 5MB 限制无法上传` };
  }
  try {
    if (['md','txt','json','csv','log'].includes(ext)) {
      const text = await file.text();
      return { text, fileType: ext, mime: file.type || 'text/plain' };
    }
    if (ext === 'pdf') {
      if (!window.pdfjsLib) return { error: 'PDF 解析库未就绪，请刷新页面重试' };
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      let text = '';
      const max = Math.min(pdf.numPages, 200);   // 防止超大 pdf 卡死
      for (let i = 1; i <= max; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(it => it.str).join(' ') + '\n\n';
      }
      if (pdf.numPages > 200) text += `\n[已截断：仅解析前 200 页，原文档共 ${pdf.numPages} 页]`;
      return { text, fileType: 'pdf', mime: 'application/pdf' };
    }
    if (ext === 'docx') {
      if (!window.mammoth) return { error: 'DOCX 解析库未就绪，请刷新页面重试' };
      const buf = await file.arrayBuffer();
      const result = await mammoth.extractRawText({ arrayBuffer: buf });
      return { text: result.value || '', fileType: 'docx', mime: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' };
    }
    if (ext === 'doc') {
      return { error: '.doc 格式不支持（请用 Word 另存为 .docx）' };
    }
    if (['xlsx','xls'].includes(ext)) {
      if (!window.XLSX) return { error: 'Excel 解析库未就绪，请刷新页面重试' };
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array' });
      let text = '';
      wb.SheetNames.forEach(sn => {
        text += `# ${sn}\n`;
        const ws = wb.Sheets[sn];
        text += XLSX.utils.sheet_to_csv(ws) + '\n\n';
      });
      return { text, fileType: ext, mime: 'application/vnd.ms-excel' };
    }
    return { error: `不支持的文件类型 .${ext}（仅支持 pdf/docx/xlsx/xls/md/txt/json/csv）` };
  } catch (e) {
    console.error('parseFileToText error:', e);
    return { error: '解析失败：' + (e.message || e) };
  }
}

/* ---- d12: 切分 + token + mockRagQuery + highlight ---- */

function chunkText(text, opts = {}) {
  const size = opts.size || KB_CHUNK_SIZE;
  const overlap = opts.overlap || 50;
  if (!text) return [];
  // 先按段落
  const paras = text.split(/\n{2,}/).map(p => p.trim()).filter(Boolean);
  const out = [];
  let buf = '';
  for (const p of paras) {
    if ((buf + '\n\n' + p).length <= size) {
      buf = buf ? buf + '\n\n' + p : p;
    } else {
      if (buf) out.push(buf);
      if (p.length <= size) {
        buf = p;
      } else {
        // 长段按句号切
        const sents = p.split(/(?<=[。！？.!?])\s*/).filter(Boolean);
        let sbuf = '';
        for (const s of sents) {
          if ((sbuf + s).length <= size) {
            sbuf += s;
          } else {
            if (sbuf) out.push(sbuf);
            // 单句仍然超长则硬切
            if (s.length > size) {
              for (let i = 0; i < s.length; i += size - overlap) {
                out.push(s.slice(i, i + size));
              }
              sbuf = '';
            } else {
              sbuf = s;
            }
          }
        }
        buf = sbuf;
      }
    }
    if (out.length >= KB_MAX_CHUNKS_PER_DOC) break;
  }
  if (buf && out.length < KB_MAX_CHUNKS_PER_DOC) out.push(buf);
  return out.slice(0, KB_MAX_CHUNKS_PER_DOC).map((text, index) => ({
    index, text, tokens: Math.ceil(text.length / 1.5),
  }));
}

function tokenize(s) {
  if (!s) return [];
  const out = [];
  // 英文 / 数字 单词
  const en = s.match(/[a-zA-Z]+\d*|\d+/g) || [];
  out.push(...en.map(w => w.toLowerCase()));
  // 中文字符
  const cn = s.match(/[\u4e00-\u9fa5]/g) || [];
  out.push(...cn);
  return out;
}

function mockRagQuery({ kbIds, query, topK = 5 }) {
  const terms = tokenize(query);
  if (!terms.length) return [];
  // 收集目标 docs
  const targetDocs = [];
  (state.kbs.list || []).forEach(kb => {
    if (!kbIds || !kbIds.includes(kb.id)) return;
    (kb.docs || []).forEach(doc => {
      (doc.chunks || []).forEach(ch => {
        targetDocs.push({ kbId: kb.id, kbName: kb.name, docId: doc.id, docName: doc.name, chunk: ch });
      });
    });
  });
  if (!targetDocs.length) return [];
  // 计算 df（按 chunk 维度）
  const df = {};
  const N = targetDocs.length;
  terms.forEach(t => {
    if (df[t] !== undefined) return;
    let c = 0;
    targetDocs.forEach(d => { if (d.chunk.text.toLowerCase().includes(t.toLowerCase())) c++; });
    df[t] = c;
  });
  const scored = targetDocs.map(d => {
    let score = 0;
    const lower = d.chunk.text.toLowerCase();
    const matched = new Set();
    terms.forEach(t => {
      const re = new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      const cnt = (lower.match(re) || []).length;
      if (cnt > 0) {
        const idf = Math.log((N + 1) / (df[t] + 1)) + 1;
        score += cnt * idf * (t.length >= 2 ? 1.5 : 1);
        matched.add(t);
      }
    });
    // 全 query 子串命中 bonus
    if (lower.includes(query.toLowerCase())) score += 3;
    return { ...d, score, matchedTerms: [...matched] };
  }).filter(x => x.score > 0);
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, topK).map(x => ({
    kbId: x.kbId, kbName: x.kbName,
    docId: x.docId, docName: x.docName,
    chunkIndex: x.chunk.index,
    text: x.chunk.text,
    score: +x.score.toFixed(2),
    matchedTerms: x.matchedTerms,
  }));
}

function highlightText(text, terms) {
  if (!terms || !terms.length) return escapeHTML(text);
  const escaped = escapeHTML(text);
  let html = escaped;
  // 按长度降序避免短词覆盖长词
  const sorted = [...new Set(terms)].sort((a, b) => b.length - a.length);
  sorted.forEach(t => {
    const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    html = html.replace(re, '<mark class="bg-amber-200 text-amber-900 px-0.5 rounded">$1</mark>');
  });
  return html;
}

  const uid = (state.user && state.user.id) || 'guest';

function loadKbs() {
  try {
    const raw = localStorage.getItem(kbLsKey());
    state.kbs.list = raw ? JSON.parse(raw) : [];
  } catch (_) { state.kbs.list = []; }
  // 兜底字段
  state.kbs.list.forEach(kb => {
    kb.docs = kb.docs || [];
    kb.docs.forEach(d => {
      d.chunks = d.chunks || [];
      d.status = d.status || 'ready';

  });
  state.kbs.loaded = true;

/* ---- KB CRUD ---- */

function createKb({ name, icon='menu_book', description='' }) {
  if (!name || !name.trim()) { showToast('知识库名称不能为空'); return null; }
  const kb = {
    id: uidKb('kb'),
    name: name.trim(),
    icon,
    description: description.trim(),
    docs: [],
    createdAt: nowKbTs(),
    updatedAt: nowKbTs(),
  };
  state.kbs.list.unshift(kb);
  saveKbs();
  return kb;
}
function nowKbTs() { return new Date().toISOString().replace('T',' ').slice(0,19); }

function renameKb(id, name) {
  const kb = state.kbs.list.find(k => k.id === id);
  if (!kb || !name.trim()) return;
  kb.name = name.trim();
  kb.updatedAt = nowKbTs();
  saveKbs();
}

function deleteKb(id) {
  const kb = state.kbs.list.find(k => k.id === id);
  if (!kb) return;
  if (!confirm(`确定删除知识库「${kb.name}」？包含的 ${kbDocCount(kb)} 个文档也会被删除，且无法恢复。`)) return;
  state.kbs.list = state.kbs.list.filter(k => k.id !== id);
  // 清理所有 mission 中的绑定
  state.missions.forEach(m => {
    if (m.kbConfig) {
      m.kbConfig.bindings = (m.kbConfig.bindings || []).filter(b => b.kbId !== id);
    }
  });
  saveKbs();
  showToast('已删除', 'success');
  render();
}

function docTypeIcon(t) {
  switch ((t||'').toLowerCase()) {
    case 'pdf': return 'picture_as_pdf';
    case 'docx': case 'doc': return 'article';
    case 'xlsx': case 'xls': case 'csv': return 'table_chart';
    case 'md': return 'description';
    case 'json': return 'data_object';
    default: return 'text_snippet';
  }
}
function humanSize(n) {
  if (n == null) return '-';
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/1024/1024).toFixed(2) + ' MB';
}
function toggleSelectDoc(id, checked) {
  if (!state.kbDetail) return;
  if (checked) state.kbDetail.selectedIds.add(id); else state.kbDetail.selectedIds.delete(id);
  render();
}
function toggleSelectAllDocs(kbId, checked) {
  const kb = state.kbs.list.find(k=>k.id===kbId);
  if (!kb) return;
  if (checked) kb.docs.forEach(d => state.kbDetail.selectedIds.add(d.id));
  else state.kbDetail.selectedIds.clear();
  render();
}
function deleteDoc(kbId, docId) {
  const kb = state.kbs.list.find(k=>k.id===kbId);
  if (!kb) return;
  const doc = kb.docs.find(d=>d.id===docId);
  if (!doc) return;
  if (!confirm(`确定删除文档「${doc.name}」？`)) return;
  kb.docs = kb.docs.filter(d=>d.id!==docId);
  kb.updatedAt = nowKbTs();
  state.kbDetail.selectedIds.delete(docId);
  saveKbs();
  render();
}
function deleteSelectedDocs(kbId) {
  const kb = state.kbs.list.find(k=>k.id===kbId);
  if (!kb) return;
  const n = state.kbDetail.selectedIds.size;
  if (!confirm(`确定删除已选 ${n} 个文档？`)) return;
  kb.docs = kb.docs.filter(d => !state.kbDetail.selectedIds.has(d.id));
  state.kbDetail.selectedIds.clear();
  kb.updatedAt = nowKbTs();
  saveKbs();
  render();
}

async function onKbFilesPicked(ev) {
  const files = Array.from(ev.target.files || []);
  ev.target.value = '';
  if (!files.length) return;
  const u = state.kbUpload;
  for (const file of files) {
    const item = { name: file.name, size: file.size, status: 'parsing', message: '解析中…' };
    u.items.push(item);
    renderKbUploadModal();
    if (file.size > KB_MAX_FILE_SIZE) {
      item.status = 'error';
      item.message = `${(file.size/1024/1024).toFixed(2)}MB > 5MB 限制`;
      showToast(`文件 "${file.name}" 大小 ${(file.size/1024/1024).toFixed(2)}MB，超过 5MB 限制无法上传`, 'error');
      renderKbUploadModal();
      continue;
    }
    const parsed = await parseFileToText(file);
    if (parsed.error) {
      item.status = 'error';
      item.message = parsed.error;
      showToast(parsed.error, 'error');
      renderKbUploadModal();
      continue;
    }
    const chunks = chunkText(parsed.text);
    if (!chunks.length) {
      item.status = 'error';
      item.message = '内容为空，无可索引文本';
      renderKbUploadModal();
      continue;
    }
    const kb = state.kbs.list.find(k => k.id === u.kbId);
    if (!kb) { item.status='error'; item.message='知识库已不存在'; renderKbUploadModal(); continue; }
    kb.docs.push({
      id: uidKb('doc'),
      name: file.name,
      mime: parsed.mime || file.type,
      size: file.size,
      fileType: parsed.fileType,
      sourceType: 'file',
      rawText: parsed.text,
      chunks,
      status: 'ready',
      uploadedAt: nowKbTs(),
    });
    kb.updatedAt = nowKbTs();
    item.status = 'ready';
    item.chunks = chunks.length;
    item.message = `${chunks.length} chunks`;
    try { saveKbs(); }
    catch(e) { item.status='error'; item.message='保存失败：'+e.message; }
    renderKbUploadModal();
    // 列表页也跟着刷
    if (state.view === 'kb_detail') {
      // 不强 render 整页 以免 modal 重建丢焦点（modal 已外置 dom）
    }
  }
  // 全部完成后刷新底层详情页
  if (state.view === 'kb_detail') render();
  renderKbUploadModal();
}

  const m = state.kbMove;
  if (!m || !m.toKbId) return;

  const to   = state.kbs.list.find(k => k.id === m.toKbId);
  if (!from || !to) return;
  const moving = from.docs.filter(d => m.docIds.includes(d.id));

  to.docs.push(...moving);

  saveKbs();
  closeMoveDocsModal();
  showToast(`已移动 ${moving.length} 个文档到「${to.name}」`, 'success');
  render();

function submitBindKbs() {

// 解析 "/kbName query"
function parseSlashCommand(text, enabledBindings) {
  const body = text.trim().slice(1);
  if (!body) {
    const names = enabledBindings.map(b => (state.kbs.list.find(k=>k.id===b.kbId) || {}).name).filter(Boolean);
    return { error: '请在 / 后输入：知识库名 + 空格 + 你的问题。例如：/' + (names[0]||'产品文档') + ' 退款政策是什么' };
  }
  const sp = body.search(/\s+/);
  const ref = sp === -1 ? body : body.slice(0, sp);
  const q   = sp === -1 ? ''   : body.slice(sp).trim();
  const kbs = state.kbs.list.filter(k => enabledBindings.some(b => b.kbId === k.id));
  const matched = kbs.find(k => k.id === ref) ||
                  kbs.find(k => k.name.toLowerCase() === ref.toLowerCase()) ||
                  kbs.find(k => k.name.toLowerCase().startsWith(ref.toLowerCase()));
  if (!matched) {
    const names = kbs.map(k => k.name).join(' / ') || '（无）';
    return { error: `未找到知识库 "${ref}"。当前已启用：${names}` };
  }
  if (!q) return { error: `请在 /${matched.name} 后输入你的问题，例如 /${matched.name} 退款政策是什么` };
  return { kbId: matched.id, query: q };
}

/* ---- / 触发气泡 ---- */
function showSlashPopover(ta, frag) {
  const m = getMission(); if (!m) return hideSlashPopover();
  const cfg = ensureMissionKbConfig(m);
  if (cfg.triggerMode !== 'slash') return hideSlashPopover();
  if (!state.kbs.loaded) loadKbs();
  const enabled = (cfg.bindings||[]).filter(b => b.enabled);
  const items = enabled.map(b => {
    const kb = state.kbs.list.find(k => k.id === b.kbId);
    return kb ? { id: kb.id, name: kb.name, icon: kb.icon||'menu_book', docs: kbDocCount(kb) } : null;
  }).filter(Boolean);
  const q = (frag||'').toLowerCase();
  const filtered = q ? items.filter(it => it.name.toLowerCase().startsWith(q) || it.name.toLowerCase().includes(q)) : items;
  state.slashPopup = { items: filtered, allItems: items, activeIndex: 0 };
  renderSlashPopover(ta);
}
function hideSlashPopover() {
  const r = document.getElementById('slash-popover'); if (r) r.remove();
  state.slashPopup = null;
}
function renderSlashPopover(ta) {
  let pop = document.getElementById('slash-popover');
  if (!pop) {
    pop = document.createElement('div');
    pop.id = 'slash-popover';
    document.body.appendChild(pop);
  }
  const s = state.slashPopup;
  const rect = ta.getBoundingClientRect();
  pop.style.cssText = `position:fixed; left:${rect.left}px; bottom:${window.innerHeight - rect.top + 6}px; width:${Math.min(360, rect.width)}px; z-index:60;`;
  if (!s || (!s.items.length && !s.allItems.length)) {
    pop.innerHTML = `
      <div class="bg-surface border border-outline-variant rounded-lg shadow-lg p-3 text-label-md text-secondary">
        当前 Mission 还没有启用的知识库。
        <button onclick="hideSlashPopover(); state.rightTab='kbs'; render();" class="text-primary hover:underline ml-1">去绑定 →</button>
      </div>`;
    return;
  }
  if (!s.items.length) {
    pop.innerHTML = `
      <div class="bg-surface border border-outline-variant rounded-lg shadow-lg p-3 text-label-md text-secondary">
        没有匹配的知识库。可用：${s.allItems.map(i => escapeHTML(i.name)).join(' / ')}
      </div>`;
    return;
  }
  pop.innerHTML = `
    <div class="bg-surface border border-outline-variant rounded-lg shadow-lg overflow-hidden text-body-md">
      <div class="px-3 py-1.5 bg-surface-container-low text-label-sm text-secondary border-b border-outline-variant flex items-center gap-1">
        <span class="material-symbols-outlined text-[14px]">menu_book</span>选择知识库（↑↓ 选择 · Enter 填充 · Esc 关闭）
      </div>
      <ul>
        ${s.items.map((it, i) => `
          <li onmouseenter="state.slashPopup.activeIndex=${i}; renderSlashPopover(document.getElementById('chat-input'))"
              onclick="selectSlashKb(${i})"
              class="flex items-center gap-2 px-3 py-1.5 cursor-pointer ${i===s.activeIndex?'bg-primary-fixed/40 text-primary':'hover:bg-surface-container-low text-on-surface'}">
            <span class="material-symbols-outlined text-primary text-[16px]">${escapeHTML(it.icon)}</span>
            <span class="flex-1 truncate">${escapeHTML(it.name)}</span>
            <span class="text-[11px] text-secondary">${it.docs} 文档</span>
          </li>`).join('')}
      </ul>
    </div>`;
}
function selectSlashKb(i) {
  const s = state.slashPopup; if (!s) return;
  const it = s.items[i]; if (!it) return;
  const ta = document.getElementById('chat-input'); if (!ta) return;
  // 找到当前 / 开头的 token，替换为 /<name> 
  const v = ta.value;
  // 期望整段以 / 开头；把 / 到第一个空白替换
  const sp = v.search(/\s/);
  const head = sp === -1 ? v : v.slice(0, sp);
  const tail = sp === -1 ? '' : v.slice(sp);
  // head 形如 "/x" 或 "/"
  const newHead = '/' + it.name;
  ta.value = newHead + ' ' + tail.replace(/^\s+/,'');
  hideSlashPopover();
  ta.focus();
  // 光标放到 newHead 之后空格之后
  const pos = newHead.length + 1;
  ta.setSelectionRange(pos, pos);
}

/* hook 进 onChatInputChange */
const _origChatChange = onChatInputChange;
onChatInputChange = function(e) {
  const ta = e.target;
  const m = getMission();
  const cfg = m ? ensureMissionKbConfig(m) : null;
  // 仅当 mission + slash 模式 + 整段以 / 开头时触发
  if (cfg && cfg.triggerMode === 'slash' && ta.value.startsWith('/')) {
    const cursor = ta.selectionStart;
    const before = ta.value.slice(0, cursor);
    const sp = before.search(/\s/);
    // 还在 head 阶段（光标在第一个空白前）
    if (sp === -1) {
      const frag = before.slice(1);    // 去掉 /
      showSlashPopover(ta, frag);
      hideMentionPopover();
      const hint = document.getElementById('input-hint');
      if (hint) hint.classList.add('hidden');
      return;
    }
  }
  hideSlashPopover();
  _origChatChange(e);
};

const _origChatKeydown = onChatInputKeydown;
onChatInputKeydown = function(e) {
  const s = state.slashPopup;
  if (s && s.items && s.items.length) {
    if (e.key === 'ArrowDown') { e.preventDefault(); s.activeIndex = (s.activeIndex+1) % s.items.length; renderSlashPopover(document.getElementById('chat-input')); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); s.activeIndex = (s.activeIndex-1+s.items.length) % s.items.length; renderSlashPopover(document.getElementById('chat-input')); return; }
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); selectSlashKb(s.activeIndex); return; }
    if (e.key === 'Escape')    { e.preventDefault(); hideSlashPopover(); return; }
  }
  _origChatKeydown(e);
};

/* ---- 输入框：实时识别 @ ---- */
function onChatInputChange(e) {
  const ta = e.target;
  const cursor = ta.selectionStart;
  const before = ta.value.slice(0, cursor);
  const lastAt = before.lastIndexOf('@');
  const lastHash = before.lastIndexOf('#');
  // 取最近的触发符
  const trigger = lastAt > lastHash ? '@' : (lastHash > lastAt ? '#' : null);
  const triggerIdx = trigger === '@' ? lastAt : lastHash;
  // 仅在触发符后紧跟空格/换行之前显示
  if (trigger && triggerIdx >= 0 && !/\s/.test(before.slice(triggerIdx+1))) {
    showAgentPopover(ta, trigger);
  } else {
    hideMentionPopover();
  }
  // 编辑意图实时提示（# 或自然语言）
  const hint = $('#input-hint');
  if (hint) {
    if (ta.value.includes('#')) {
      hint.innerHTML = `<span class="material-symbols-outlined text-[12px]">edit_square</span> # 模式：直接修改 Agent 配置（发送后弹出变更预览）`;
      hint.classList.remove('hidden');
      hint.classList.add('text-primary','flex','items-center','gap-1');
    } else if (parseEditIntent(ta.value)) {
      hint.textContent = '检测到编辑指令 — 发送后会弹出变更预览';
      hint.classList.remove('hidden');
      hint.classList.add('text-primary');
    } else {
      hint.classList.add('hidden');
    }
  }
}

function onChatInputKeydown(e) {
  if (e.key === 'Escape') hideMentionPopover();
  const isImeComposing = e.isComposing || e.keyCode === 229;
  if (isImeComposing) return;
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
}

/* ---- 自然语言编辑意图解析 ---- */
function parseEditIntent(text) {
  if (!text) return null;
  const m = getMission(); if (!m) return null;
  const skillNames = getAllSkills().map(s => s.name);

  const matchAgent = (frag) => {
    if (!frag) return null;
    const norm = (s) => s.toLowerCase().replace(/[\s师员]+/g,'');
    return m.squad.agents.find(a =>
      a.name.toLowerCase().includes(frag.toLowerCase()) ||
      norm(a.name).includes(norm(frag)) ||
      (a.role || '').toLowerCase().includes(frag.toLowerCase())
    );
  };

  /* ===== 显式 # 语法 — 最高优先级 ===== */
  // 形如：#AgentName 加 web_search 技能 / #AgentName 移除 chart_render / #AgentName 更关注新能源
  const hashMatch = text.match(/#([^\s#@]+)\s+(.+)/);
  if (hashMatch) {
    const ag = matchAgent(hashMatch[1]);
    if (!ag) return null;
    const body = hashMatch[2].trim();

    // # 后再检查 add/remove/prompt
    const addSk = skillNames.find(s => new RegExp('(加上?|增加|新增|添加|装上|配上|开启|启用)\\s*' + s, 'i').test(body));
    if (addSk && !ag.skills.includes(addSk)) {
      return {
        agentId: ag.id,
        summary: `为 ${ag.name} 添加 ${addSk} 技能`,
        addedSkills: [addSk], removedSkills: [], promptDiff: []
      };
    }
    const rmSk = skillNames.find(s => new RegExp('(去掉|移除|关闭|禁用|删除|停用)\\s*' + s, 'i').test(body));
    if (rmSk && ag.skills.includes(rmSk)) {
      return {
        agentId: ag.id,
        summary: `从 ${ag.name} 移除 ${rmSk} 技能`,
        addedSkills: [], removedSkills: [rmSk], promptDiff: []
      };
    }
    // 默认：把整段视作 prompt 调整
    const oldLines = ag.systemPrompt.split('\n');
    return {
      agentId: ag.id,
      summary: `调整 ${ag.name} 的配置：${body.slice(0,28)}${body.length>28?'...':''}`,
      addedSkills: [], removedSkills: [],
      promptDiff: [
        ...oldLines.map(l => ({type:'keep', text:l})),
        { type:'add', text: `补充指令（# 直接修改）：${body}` }
      ]
    };
  }

  // 自然语言匹配
  const addPat = /(给|让|为)\s*([^,，。：:]+?)\s*(加上?|增加|新增|添加|装上|配上|开启)\s*([a-z_]+)\s*(技能|工具)?/i;
  const removePat = /(去掉|移除|关闭|禁用|删除)\s*([^,，。：:]+?)\s*的?\s*([a-z_]+)\s*(技能|工具)?/i;
  const promptPat = /(让|把)\s*([^,，。：:]+?)\s*(更|更加|偏向|关注|聚焦|强调|不要|减少)/;

  let r;
  if ((r = text.match(addPat))) {
    const ag = matchAgent(r[2]); if (!ag) return null;
    const sk = skillNames.find(s => s.toLowerCase() === r[4].toLowerCase());
    if (!sk) return null;
    if (ag.skills.includes(sk)) return null;
    return {
      agentId: ag.id,
      summary: `为 ${ag.name} 添加 ${sk} 技能`,
      addedSkills: [sk], removedSkills: [], promptDiff: []
    };
  }
  if ((r = text.match(removePat))) {
    const ag = matchAgent(r[2]); if (!ag) return null;
    const sk = r[3];
    if (!ag.skills.includes(sk)) return null;
    return {
      agentId: ag.id,
      summary: `从 ${ag.name} 移除 ${sk} 技能`,
      addedSkills: [], removedSkills: [sk], promptDiff: []
    };
  }
  if ((r = text.match(promptPat))) {
    const ag = matchAgent(r[2]); if (!ag) return null;
    const oldLines = ag.systemPrompt.split('\n');
    const addition = `补充指令（来自用户自然语言修改）：${text}`;
    return {
      agentId: ag.id,
      summary: `调整 ${ag.name} 的 System Prompt 倾向性`,
      addedSkills: [], removedSkills: [],
      promptDiff: [
        ...oldLines.map(l => ({type:'keep', text:l})),
        {type:'add', text: addition}
      ]
    };
  }
  return null;
}

/* ---- 群聊 @ 多 Agent 解析 ---- */
function parseMentions(text) {
  const m = getMission(); if (!m) return [];
  const out = [];
  m.squad.agents.forEach(a => {
    if (text.includes('@' + a.name)) out.push(a);
  });
  // 也检查自建 Agent（数据库中的自定义 Agent）
  (state.customAgents || []).forEach(a => {
    if (text.includes('@' + a.name) && !out.some(x => x.name === a.name)) {
      out.push({ ...a, role: a.description || a.system_prompt || '', skills: a.tools || [] });
    }
  });
  return out;
}

function simulateGroupChat(text, mentioned) {
  const run = getRun();

/* ---- sendChat 升级版 ---- */
function sendChat() {
  const ta = $('#chat-input'); if (!ta) return;
  const text = ta.value.trim(); if (!text) return;
  ta.value = '';
  hideMentionPopover();

  // Quick Run 分支
  if (state.view === 'quickRun') {
    const qr = state.quickRun;
    qr.conversation.push({ type:'user', who:'You', time: now(), text });
    qr.turns += 1;
    render();
    setTimeout(() => {
      qr.conversation.push({
        type:'agent', agent:'Quick Assistant', icon:'bolt', time: now(),
        text: `已处理你的请求："${text.slice(0,60)}"。这是一段示意回复，真实环境会基于通用 Agent 完成。`
      });
      render();
    }, 700);
    return;
  }

  // Mission 分支
  const run = getRun();
  const m0 = getMission();
  const cfg = m0 ? ensureMissionKbConfig(m0) : { triggerMode:'auto', bindings:[] };
  const enabledBindings = (cfg.bindings||[]).filter(b => b.enabled);

  // === SLASH 模式：以 / 开头 → 单 KB 检索（不走 intent/mentions）===
  if (cfg.triggerMode === 'slash' && text.startsWith('/')) {
    run.conversation.push({ type:'user', who:'You', time: now(), text });
    if (!enabledBindings.length) {
      run.conversation.push({ type:'system', text:'当前 Mission 未启用任何知识库，请到右栏「知识库」Tab 绑定/启用后再使用 / 触发' });
      render();
      return;
    }
    const parsed = parseSlashCommand(text, enabledBindings);
    if (parsed.error) {
      run.conversation.push({ type:'system', text: parsed.error });
      render();
      return;
    }
    const binding = enabledBindings.find(b => b.kbId === parsed.kbId);
    const hits = mockRagQuery({ kbIds:[parsed.kbId], query: parsed.query, topK: (binding && binding.topK) || 5 });
    if (hits.length) {
      run.conversation.push({ type:'rag', time: now(), hits, query: parsed.query, kbIds:[parsed.kbId], collapsed: true });
    }
    render();
    setTimeout(() => {
      const a = m0.squad.agents[0];
      if (!a) return;
      let reply;
      if (!hits.length) {
        const kbName = state.kbs.list.find(k => k.id === parsed.kbId)?.name || parsed.kbId;
        reply = `已收到。在知识库「${kbName}」中未找到与「${parsed.query}」相关的片段。`;
      } else {
        const docs = [...new Set(hits.map(h => h.docName))];
        reply = `基于检索到的 ${hits.length} 条片段，回答如下：\n\n${hits[0].text.slice(0, 180)}${hits[0].text.length>180?'…':''}\n\n（已参考：${docs.join('，')}）`;
      }
      run.conversation.push({ type:'agent', agent:a.name, icon:a.icon, time: now(), text: reply });
      render();
    }, 700);
    return;
  }

  // === AUTO 模式 / 无 RAG：先 push 用户消息 ===
  run.conversation.push({ type:'user', who:'You', time: now(), text });

  // AUTO RAG 注入：检索并推 rag 消息
  let autoHits = null;
  if (cfg.triggerMode === 'auto' && enabledBindings.length) {
    const kbIds = enabledBindings.map(b => b.kbId);
    const topK  = Math.max(...enabledBindings.map(b => b.topK||5));
    autoHits = mockRagQuery({ kbIds, query: text, topK });
    if (autoHits.length) {
      run.conversation.push({ type:'rag', time: now(), hits: autoHits, query: text, kbIds, collapsed: true });
    }
  }

  // 1) 编辑意图优先
  const intent = parseEditIntent(text);
  if (intent) {
    run.conversation.push({
      type:'diff-card',
      summary: intent.summary,
      payload: intent
    });
    render();
    setTimeout(() => openModalAgentDiff(intent), 200);
    return;
  }

  // 2) @ 多 Agent 群聊
  const mentioned = parseMentions(text);
  if (mentioned.length >= 1) {
    render();
    simulateGroupChat(text, mentioned);
    return;
  }

  // 3) 默认：调用后端API处理请求
  render();
  scrollChatToBottom();
  const m = getMission();
  const a = m.squad.agents[0];
  const targetAgent = a || { name:'orchestrator', icon:'hub', id:'orchestrator' };
  // 先显示收到消息的提示
  let waitReply = a ? '已收到。正在调用后端AI处理您的请求...' : '已收到。将交由 Orchestrator 处理...';
  run.conversation.push({ type:'agent', agent:targetAgent.name, icon:targetAgent.icon, time: now(), text: waitReply });
  render();
  scrollChatToBottom();
  
  // 调用后端聊天接口
  (async () => {
    try {
      const response = await api('/chat', {
        method: 'POST',
        body: JSON.stringify({
          message: text,
          agent: targetAgent,
          mission: m
        })
      });
      
      if (response.ok && response.reply) {
        // 移除等待消息
        run.conversation.pop();
        render();
        scrollChatToBottom();
        
        // 如果有中间消息（子Agent依次回复），逐个以打字机动画显示
        if (response.intermediate_messages && response.intermediate_messages.length > 0) {
          for (const imsg of response.intermediate_messages) {
            const agentName = imsg.agent_id === 'orchestrator' ? 'Orchestrator' : imsg.agent_id;
            const icon = imsg.agent_id === 'orchestrator' ? 'hub' : 'smart_toy';
            run.conversation.push({
              type: 'agent',
              agent: agentName,
              icon: icon,
              time: now(),
              text: ''
            });
            render();
            scrollChatToBottom();
            await typewriteLastBubble(imsg.content, 12);
          }
        }
        
        // 最后以打字机动画显示 orchestrator 的最终总结回复（速度略快）
        run.conversation.push({ type:'agent', agent:targetAgent.name, icon:targetAgent.icon, time: now(), text: '' });
        render();
        scrollChatToBottom();
        await typewriteLastBubble(response.reply, 8);
      } else {
        // API返回但无reply
        run.conversation.pop();
        run.conversation.push({ type:'agent', agent:targetAgent.name, icon:targetAgent.icon, time: now(), text: '抱歉，未收到有效回复。' });
        render();
        scrollChatToBottom();
      }
    } catch (error) {
      // API调用失败，显示错误信息
      run.conversation.pop();
      run.conversation.push({ type:'agent', agent:targetAgent.name, icon:targetAgent.icon, time: now(), text: '抱歉，调用后端API时出错了：' + error.message });
      render();
      scrollChatToBottom();
    }
  })();
}

/* ===================== Auth · 前后端集成 ===================== */
const API_BASE = 'http://localhost:8000/api';

async function api(path, init = {}) {
  const headers = Object.assign(
    { 'Content-Type': 'application/json' },
    init.headers || {}
  );
  const token = localStorage.getItem('agenthub_token');
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API_BASE + path, { ...init, headers });
  let data = null;
  try { data = await res.json(); } catch(e) {}
  if (!res.ok) {
    // 401 处理
    if (res.status === 401) {
      const hadToken = !!localStorage.getItem('agenthub_token');
      if (hadToken) {
        // 有 token 但失效 → 清除并提示
        localStorage.removeItem('agenthub_token');
        state.user = null;
        render();
        showToast('登录已过期，请重新登录', 'error');
        openAuthModal && openAuthModal('login');
        throw new Error('登录已过期，请重新登录');
      } else {
        // 未登录 → 直接弹注册/登录窗
        showToast('请先注册或登录后再继续', 'error');
        openAuthModal && openAuthModal('register');
        throw new Error('请先注册或登录');
      }
    }
    const msg = (data && (data.detail || data.error || data.message)) || ('HTTP ' + res.status);
    throw new Error(msg);
  }
  return data;
}

            <div class="w-8 h-8 bg-primary rounded flex items-center justify-center text-white font-bold">A</div>
            <h3 class="text-title-lg text-on-surface">${isLogin ? '登录 AgentHub' : '注册 AgentHub'}</h3>
          </div>
          <button onclick="closeModal('modal-auth')" class="p-1 rounded hover:bg-surface-container">
            <span class="material-symbols-outlined text-secondary">close</span>
          </button>
        </div>
        <div class="px-lg flex border-b border-outline-variant">
          ${tabBtn('register', '注册')}
          ${tabBtn('login',    '登录')}
        </div>
        <form class="px-lg py-lg space-y-md" onsubmit="event.preventDefault(); ${isLogin ? 'commitLogin()' : 'commitRegister()'}">
          ${isLogin ? '' : `
            <div>
              <label class="block text-label-md text-on-surface mb-1">用户名</label>
              <input id="auth-username" type="text" required minlength="2" maxlength="32"
                     placeholder="例如：Alex Chen"
                     class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:border-primary focus:ring-0 transition-colors"/>
            </div>`}
          <div>
            <label class="block text-label-md text-on-surface mb-1">邮箱</label>
            <input id="auth-email" type="email" required
                   placeholder="you@example.com"
                   class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:border-primary focus:ring-0 transition-colors"/>
          </div>
          <div>
            <label class="block text-label-md text-on-surface mb-1">密码</label>
            <input id="auth-password" type="password" required minlength="6"
                   placeholder="至少 6 位"
                   class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:border-primary focus:ring-0 transition-colors"/>
          </div>
          <p id="auth-error" class="hidden text-label-md text-error"></p>
          <button type="submit"
                  class="w-full bg-primary text-white py-2.5 rounded-lg font-medium text-label-md hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-[18px]">${isLogin ? 'login' : 'person_add'}</span>
            <span>${isLogin ? '登录' : '注册并登录'}</span>
          </button>
          <p class="text-label-sm text-secondary text-center pt-1">
            ${isLogin ? '还没有账号？' : '已有账号？'}
            <a onclick="switchAuthTab('${isLogin ? 'register' : 'login'}')"
               class="text-primary cursor-pointer hover:underline font-medium">
              ${isLogin ? '点此注册' : '直接登录'}
            </a>
          </p>
        </form>
      </div>
    </div>`;
  setTimeout(() => $(isLogin ? '#auth-email' : '#auth-username')?.focus(), 50);
}

function showAuthError(msg) {
  const el = $('#auth-error');
  if (!el) return;
  el.textContent = msg;
  el.classList.remove('hidden');
}

const ERROR_MESSAGES = {
  username_too_short: '用户名至少 2 位',
  invalid_email: '邮箱格式不正确',
  password_too_short: '密码至少 6 位',
  email_already_registered: '该邮箱已注册，请直接登录',
  invalid_credentials: '邮箱或密码错误',
};

async function commitRegister() {
  const username = $('#auth-username').value.trim();
  const email    = $('#auth-email').value.trim();
  const password = $('#auth-password').value;
  try {
    const r = await api('/register', {
      method: 'POST',
      body: JSON.stringify({ username, email, password })
    });
    if (r && r.ok) {
      localStorage.setItem('agenthub_token', r.token);
      state.user = r.user;
      closeModal('modal-auth');
      showToast(`欢迎，${r.user.username}！`, 'success');
      loadSkills();
      render();
    }
  } catch (e) {
    const accountExists = ['用户名已存在', '邮箱已被注册'].includes(e.message);
    if (accountExists) {
      try {
        const loginRes = await api('/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        if (loginRes && loginRes.ok) {
          localStorage.setItem('agenthub_token', loginRes.token);
          state.user = loginRes.user;
          closeModal('modal-auth');
          showToast('检测到已有账户，已自动登录 ' + loginRes.user.username, 'success');
          loadSkills();
          render();
          return;
        }
      } catch (loginError) {
        showAuthError('该账户已存在，但当前密码不正确，请直接登录并检查密码。');
        return;
      }
    }
    showAuthError(ERROR_MESSAGES[e.message] || ('注册失败：' + e.message));
  }
}

async function commitLogin() {
  const email    = $('#auth-email').value.trim();
  const password = $('#auth-password').value;
  try {
    const r = await api('/login', {
      method: 'POST',
      body: JSON.stringify({ email, password })
    });
    if (r && r.ok) {
      localStorage.setItem('agenthub_token', r.token);
      state.user = r.user;
      closeModal('modal-auth');
      showToast(`欢迎回来，${r.user.username}！`, 'success');
      loadSkills();
      render();
    }
  } catch (e) {
    showAuthError(ERROR_MESSAGES[e.message] || ('登录失败：' + e.message));
  }
}

function logout() {
  localStorage.removeItem('agenthub_token');
  state.user = null;
  state.skills = { market: state.skills.market, mine: [], loaded: state.skills.loaded };
  showToast('已退出登录', 'info');
  render();
}

/* ===================== 验收自检（控制台） ===================== */
window.__verifyChecklist = function() {
  const checks = [
    ['后端 missions 已加载', () => state.missions.length >= 0],
    ['后端 skills 已加载', () => state.skills.loaded],
    ['认证状态正常', () => state.user === null || (state.user && state.user.id)],
    ['Mission 工作台有当前 Run', () => !!getRun()],
    ['@ 多 Agent 解析', () => parseMentions('@Agent1 @Agent2 一起想想').length === 2],
    ['编辑意图解析正常', () => !!parseEditIntent('给默认助手加 web_search 技能')],
    ['详情页 NL 面板渲染（team tab=overview）', () => {
      const m = getMission('mis_fin');
      const mgr = m.squad.agents.find(x => x.kind === 'team');
      const html = renderAgentDetailNLPanel(mgr, mgr, 'overview');
      return typeof html === 'string' && html.includes('修改这个 Agent') && html.includes('解析并预览');
    }],
    ['NL 面板每个 Tab 都有提示词', () => {
      const m = getMission('mis_fin');
      const mgr = m.squad.agents.find(x => x.kind === 'team');
      const tabs = ['overview','prompt','skills','memory','planning','validation','hooks','team','readme','missions'];
      return tabs.every(t => {
        const html = renderAgentDetailNLPanel(mgr, mgr, t);
        return typeof html === 'string' && html.includes('placeholder=');
      });
    }],
    ['Add Agent Modal 函数齐全', () =>
      typeof openModalAddAgent === 'function' &&
      typeof closeModalAddAgent === 'function' &&
      typeof addAgentFromLibrary === 'function' &&
      typeof addAgentFromMarketToMission === 'function' &&
      typeof createAgentFromNL === 'function' &&
      typeof guessAgentFromNL === 'function'
    ],
    ['guessAgentFromNL 能识别翻译类描述', () => {
      const g = guessAgentFromNL('能把英文论文翻译成中文');
      return g.icon === 'translate' && g.name === 'Translator' && g.skills.includes('translate');
    }],
  ];
  console.group('AgentHub · 验收清单');
  checks.forEach(([t, fn]) => {
    let ok = false; try { ok = fn(); } catch(e){}
    console.log(`%c${ok?'✅':'❌'} ${t}`, `color:${ok?'green':'red'};font-weight:bold`);
  });
  console.groupEnd();
};
setTimeout(() => window.__verifyChecklist?.(), 800);

/* ===== Toast ===== */
function showToast(msg, type='info') {
  const el = $('#toast');
  const colorClass = type === 'success' ? 'bg-tertiary text-white'
                  : type === 'error'   ? 'bg-error text-white'
                  : 'bg-inverse-surface text-inverse-on-surface';
  el.className = `fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] ${colorClass} px-4 py-2 rounded-lg shadow-lg text-label-md transition-all`;
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.add('hidden'), 2200);
}

document.addEventListener('DOMContentLoaded', () => {
  loadCustomSkills();
  render();
  bootstrapAuth();
});

window.addEventListener('beforeunload', (e) => {
  if (state.detail && state.detail.dirty) {
    e.preventDefault();
    e.returnValue = '';
    return '';
  }
});
</script>
