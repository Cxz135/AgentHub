<script>
/* ===== helpers ===== */
const $  = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const uid = (p='id') => p + '_' + Math.random().toString(36).slice(2,8);
const now = () => new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
const escapeHTML = (s='') => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const escapeAttr = escapeHTML;

const sleep = (ms) => new Promise(r => setTimeout(r, ms));

/** 滚动聊天区到底部（解决每次render后滚动到顶部的问题） */
function scrollChatToBottom() {
  requestAnimationFrame(() => {
    const el = document.getElementById('chat-stream');
    if (el) el.scrollTop = el.scrollHeight;
  });
}

/** 对最后一个 agent 消息气泡执行打字机动画 */
let _typingLock = false;
let _typingSkip = false;
async function typewriteLastBubble(fullText, speed = 10) {
  if (_typingLock) { _typingLock = false; await sleep(50); }
  _typingLock = true;
  _typingSkip = false;
  const stream = document.getElementById('chat-stream');
  if (!stream) { _typingLock = false; return; }
  const bubbles = Array.from(stream.querySelectorAll('.flex.justify-start'));
  const bubbleDiv = bubbles[bubbles.length - 1];
  if (!bubbleDiv) { _typingLock = false; return; }
  const textEl = bubbleDiv.querySelector('.bg-surface-container-lowest');
  if (!textEl) { _typingLock = false; return; }

  // 点击气泡可跳过打字动画
  const skipHandler = () => { _typingSkip = true; };
  bubbleDiv.addEventListener('click', skipHandler, { once: true });

  const run = getRun();
  const msg = run.conversation[run.conversation.length - 1];
  if (!msg) { _typingLock = false; return; }

  textEl.innerHTML = '';
  let displayed = '';
  
  // 长文本(>500字)使用更快速度
  const effectiveSpeed = fullText.length > 500 ? Math.max(2, speed / 2) : speed;
  
  for (let i = 0; i < fullText.length; i++) {
    if (!_typingLock || _typingSkip) break;  // 允许取消动画或跳过
    displayed += fullText[i];
    msg.text = displayed;
    textEl.innerHTML = formatMentions(displayed) + '<span class="typing-cursor">▌</span>';
    scrollChatToBottom();
    await sleep(effectiveSpeed);
  }
  msg.text = fullText;
  textEl.innerHTML = formatMentions(fullText);
  scrollChatToBottom();
  _typingLock = false;
  _typingSkip = false;
  bubbleDiv.removeEventListener('click', skipHandler);
}

/* ===== builtin skills ===== */
const BUILTIN_SKILLS = [];

/* ===== templates ===== */
const TEMPLATES = [];

/* ===== seed missions ===== */
function makeAgent(name, role, icon, prompt, skills, kind='agent') {
  return {
    id: uid('agent'), name, role, icon, systemPrompt: prompt,
    skills: skills || [],
    mcpTools: [],
    model:'GPT-4o (Omni)',
    kind,                                    // 'team' | 'agent'
    teamMemberIds: [],                       // 仅 team 用：被该 team 调度的 agent id 顺序列表
    memoryConfig: {
      strategy: 'window',                    // 'window'|'summary'|'kv'|'none'
      windowSize: 10,
      summaryPrompt: '请将以上对话内容浓缩为一段不超过 200 字的要点摘要，保留关键事实、决策与下一步。',
      kvNamespace: '',
    },
    planningConfig: {
      mode: 'react',                         // 'react'|'plan_execute'|'reflection'|'manual'
      stepsTemplate: '1. 理解任务\n2. 拆解步骤\n3. 调用工具\n4. 汇总输出',
    },
    validationConfig: {
      strategy: 'none',                      // 'none'|'self_review'|'judge_llm'|'rules'
      rules: [],
      judgePrompt: '请检查以上回答是否覆盖了用户问题的全部要点，列出 missed_points: [] 与 ok: true/false',
    },
    hooks: {
      preToolUse: '', postToolUse: '', onError: '', onComplete: '',
    },
    readme: '', versions: [], ownerId: null, updatedAt: Date.now()
  };
}

const MISSIONS = [];

/* ===== global state ===== */
const state = {
  view: 'dashboard',
  missionId: null,
  runId: 'run_current',
  rightTab: 'agents',
  selectedAgentId: null,
  missions: [],  // 从后端加载
  customAgents: [],  // 从后端 API 加载的自定义 Agent
  customSkills: [],
  // Skills 系统（market + mine）
  skills: { market: [], mine: [], loaded: false },
  skillsTab: 'mine',          // 'mine' | 'market'
  agentLibraryTab: 'mine',    // 'mine' | 'market'
  agentKindFilter: 'all',     // 'all' | 'team' | 'agent'
  agentLibraryQuery: '',
  // 注：agentCreateModal 不需要额外状态，create modal 直接复用 modal-create-mission
  agentCreateModal: false,  // 自定义Agent创建弹窗
  agentToolsSkillQuery: '',
  skillEdit: null,            // { id?, slug, name, icon, description, code, category }
  attachCreatedSkillToCurrentAgent: false,
  // 详情页状态
  detail: null,               // { type:'agent'|'skill', missionId?, agentId?, skillId?, tab, draft, dirty, versionDropdownOpen }
  pendingDiff: null,
  quickRun: { turns: 0, conversation: [], promptedSave: false },
  // 用户登录态（null = 未登录）
  user: null,
  // 工作区指引板块折叠（从 localStorage 恢复）
  introCollapsed: (typeof localStorage !== 'undefined' && localStorage.getItem('dashboard_intro_collapsed') === '1'),
  // Auth modal 当前 Tab：'register' | 'login'
  authTab: 'register',
  // MCP Servers（state.mcpServers）
  mcpServers: [],
  mcpLoaded: false,
  // Tools 页面：当前主分类（'skill' | 'mcp'）
  toolsKind: 'skill',
  // Agent 市场（mock，社区其他用户上传的 Team / Agent）
  agentMarket: [
    { id:'mkt_fin_team',   name:'Financial Ops Team', role:'统筹财务分析流程，拆解任务并协调多个执行 Agent。', icon:'hub',
      skills:['code_exec','chart_render','diff_compare'], authorName:'Alice@AgentHub', installCount: 1284, kind:'team', model:'GPT-4o (Omni)' },
    { id:'mkt_growth_team',name:'Growth Campaign Team', role:'负责增长活动拆解、素材协同与复盘汇总。', icon:'groups',
      skills:['web_search','markdown_write','email_compose'], authorName:'Bob@AgentHub', installCount: 932, kind:'team', model:'Claude 3.5 Sonnet' },
    { id:'mkt_visualizer', name:'Data Visualizer', role:'把结构化数据转成图表草稿。', icon:'insert_chart',
      skills:['chart_render','code_exec'], authorName:'Carol@AgentHub', installCount: 2150, kind:'agent', model:'GPT-4o mini' },
    { id:'mkt_searcher',   name:'Web Researcher', role:'抓取最新公开信息并去重。', icon:'travel_explore',
      skills:['web_search','fact_check'], authorName:'Dan@AgentHub', installCount: 4302, kind:'agent', model:'Claude 3.5 Sonnet' },
    { id:'mkt_translator', name:'Translator', role:'中英互译，保持术语一致。', icon:'translate',
      skills:['web_search'], authorName:'Eve@AgentHub', installCount: 778, kind:'agent', model:'Gemini 1.5 Pro' },
    { id:'mkt_code_review',name:'Code Reviewer', role:'按团队规范审查代码并给修改建议。', icon:'code',
      skills:['code_exec','diff_compare'], authorName:'Frank@AgentHub', installCount: 1876, kind:'agent', model:'GPT-4o (Omni)' },
  ],
};

const getMission = (id=state.missionId) => state.missions.find(m => m.id===id);
const getRun = () => {
  const m = getMission(); if (!m) return null;
  return m.runs.find(r => r.id===state.runId) || m.runs[0];
};

/* ===== SideNav ===== */
function renderSideNav() {
  console.log('[DEBUG-SIDEBAR] 开始执行renderSideNav()');
  // Missions 大类是否激活（Quick Run 已独立，不再触发 Missions 高亮）
  const missionsTabActive = ['dashboard','mission'].includes(state.view);
  const quickRunActive = state.view === 'quickRun';

  // 先定义所有内部函数和变量
  const renderTopTab = (id, icon, label, onclick) => {
    const active = (id === 'missions' && missionsTabActive)
                || (id === 'agents'    && state.view === 'agents')
                || (id === 'skills'    && state.view === 'skills')
                || (id === 'kbs'       && (state.view === 'kbs' || state.view === 'kb_detail'))
                || (id === 'settings'  && state.view === 'settings');
    return `
      <a onclick="${onclick}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg cursor-pointer transition-colors
                ${active ? 'bg-secondary-container text-on-surface font-medium'
                         : 'text-on-surface-variant hover:bg-surface-container-low'}">
        <span class="material-symbols-outlined text-[20px]">${icon}</span>
        <span class="text-body-md">${label}</span>
      </a>`;
  };

  // 子项列表（仅当 Missions Tab 激活时展开）
  console.log('[DEBUG-SIDEBAR] 渲染侧边栏，每个mission:', state.missions);
  const missionItems = state.missions.map(m => {
    console.log('[DEBUG-SIDEBAR] 当前mission:', m, 'name=', m.name, 'icon=', m.icon, 'runs.length=', m.runs?.length);
    const active = state.view === 'mission' && m.id === state.missionId;
    const runsHTML = active ? `
      <div class="ml-6 mt-0.5 space-y-0.5 border-l border-outline-variant/60 pl-3 pb-1">
        ${m.runs.map(r => {
          const isCurrent = r.id === state.runId;
          const color = isCurrent ? 'text-primary font-medium'
                      : 'text-on-surface-variant hover:text-on-surface';
          return `<div class="flex items-center gap-1.5 py-1 text-label-md cursor-pointer ${color}"
                       onclick="openRun('${m.id}','${r.id}')">
                    <span>${escapeHTML(r.title)}</span>
                  </div>`;
        }).join('')}
      </div>` : '';
    return `
      <div>
        <a class="flex items-center justify-between gap-2 pl-3 pr-2 py-1.5 rounded-lg cursor-pointer transition-colors
                  ${active ? 'bg-secondary-container/60 text-on-surface font-medium'
                           : 'text-secondary hover:bg-surface-container-low'}"
           onclick="openMission('${m.id}')">
          <div class="flex items-center gap-2 min-w-0">
            <span class="material-symbols-outlined text-[16px]">${m.icon}</span>
            <span class="text-label-md truncate">${escapeHTML(m.name)}</span>
          </div>
          <div class="flex items-center gap-1">
            <span class="text-[10px] text-secondary opacity-70">${m.runs.length}</span>
            <span class="material-symbols-outlined text-[14px] text-red-500 hover:text-red-700 cursor-pointer opacity-60 hover:opacity-100"
                  onclick="event.stopPropagation(); deleteMission('${m.id}')" title="删除">delete</span>
          </div>
        </a>
        ${runsHTML}
      </div>`;
  }).join('');

  const missionsExpanded = missionsTabActive ? `
    <div class="ml-2 mt-1 space-y-0.5 border-l border-outline-variant/60 pl-2">
      <div class="pt-1 pb-0.5 px-2 text-[10px] uppercase tracking-wider text-secondary/70 font-bold">
        我的任务
      </div>
      ${missionItems}
    </div>` : '';

  // 最后return整个侧边栏的HTML，确保所有变量都定义了
  return `
    <aside class="w-[260px] h-full border-r border-outline-variant bg-surface flex flex-col p-3 shrink-0">
      <!-- Logo -->
      <div class="flex items-center gap-3 px-2 pt-1 pb-4">
        <div class="w-8 h-8 bg-primary rounded flex items-center justify-center text-white font-bold">A</div>
        <div>
          <h1 class="text-title-lg font-headline-lg text-on-surface leading-tight">AgentHub</h1>
          <p class="text-label-sm text-secondary">多 Agent 协作工作台</p>
        </div>
      </div>

      <!-- 主 CTA + Quick Run（并列） -->
      <div class="space-y-2 mb-md">
        <button onclick="openCreateMission()"
          class="w-full py-2.5 px-3 bg-primary text-white rounded-lg flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-sm">
          <span class="material-symbols-outlined text-[18px]">add</span>
          <span class="text-body-md font-medium">New Mission</span>
        </button>
        <button onclick="openQuickRun()"
          class="w-full py-2.5 px-3 rounded-lg flex items-center justify-center gap-2 active:scale-[0.98] transition-all border
                 ${quickRunActive
                   ? 'bg-primary text-white border-primary shadow-sm hover:opacity-90'
                   : 'bg-primary-fixed/40 text-primary border-primary/30 hover:bg-primary-fixed/70'}">
          <span class="material-symbols-outlined text-[18px]">bolt</span>
          <span class="text-body-md font-medium">Quick Run</span>
        </button>
      </div>

      <!-- 顶层 4 个 Tab -->
      <nav class="flex-1 overflow-y-auto space-y-1 pr-1">
        ${renderTopTab('missions',  'assignment',     'Missions',  'openDashboard()')}
        ${missionsExpanded}
        ${renderTopTab('agents',    'smart_toy',      'Agents',    'openAgentsPage()')}
        ${renderTopTab('skills',    'build',      'Tools',     'openToolsPage()')}
        ${renderTopTab('kbs',       'menu_book',      '知识库',     'openKnowledgePage()')}
        ${renderTopTab('settings',  'settings',       'Settings',  'openSettingsPage()')}
      </nav>

      <!-- 底部用户卡 -->
      <div class="mt-2 pt-3 border-t border-outline-variant flex items-center gap-3 px-2 cursor-pointer hover:bg-surface-container-low rounded-lg transition-colors"
           onclick="openAuthModal()">
        <div class="w-8 h-8 rounded-full ${state.user ? 'bg-primary' : 'bg-surface-container'} flex items-center justify-center">
          <span class="material-symbols-outlined ${state.user ? 'text-white' : 'text-secondary'} text-[18px]">
            ${state.user ? 'person' : 'person_add'}
          </span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-label-md font-medium truncate ${state.user ? 'text-on-surface' : 'text-secondary'}">
            ${state.user ? escapeHTML(state.user.username) : 'Guest'}
          </p>
          <p class="text-[10px] text-secondary truncate">
            ${state.user ? escapeHTML(state.user.email) : '点击注册 / 登录'}
          </p>
        </div>
        ${state.user
          ? `<span class="material-symbols-outlined text-secondary text-[16px] cursor-pointer hover:text-error" title="退出登录" onclick="event.stopPropagation();logout()">logout</span>`

// 添加删除mission的函数
async function deleteMission(missionId) {
  if (!confirm(`确定要删除任务 "${state.missions.find(m => m.id === missionId)?.name}" 吗？`)) {
    return;
  }
  
  try {
    const response = await api(`/missions/${missionId}`, {
      method: 'DELETE'
    });
    
    if (response && response.ok) {
      // 从前端状态中移除
      state.missions = state.missions.filter(m => m.id !== missionId);
      // 如果删除的是当前选中的mission，切换到第一个
      if (state.missionId === missionId && state.missions.length > 0) {
        state.missionId = state.missions[0].id;
      } else if (state.missions.length === 0) {
        state.missionId = null;
      }
      showToast('任务已删除', 'success');
      render();
    } else {
      showToast('删除失败：后端返回错误', 'error');
    }
  } catch (error) {
    console.error('删除mission失败:', error);
    // 即使后端API失败，也从前端移除
    state.missions = state.missions.filter(m => m.id !== missionId);
    if (state.missionId === missionId && state.missions.length > 0) {
      state.missionId = state.missions[0].id;
    }
    showToast('已本地删除（后端API调用失败）', 'warning');
    render();
  }
}

/* ===== Schema Migration / Defaults ===== */
const MCP_STORAGE_KEY = 'agenthub_mcp_servers_v1';
const CUSTOM_SKILLS_STORAGE_KEY = 'agenthub_custom_skills_v1';

function loadMcpServers() {
  if (state.mcpLoaded) return;
  try {
    const raw = localStorage.getItem(MCP_STORAGE_KEY);
    state.mcpServers = raw ? JSON.parse(raw) : [];
  } catch (e) { state.mcpServers = []; }
  state.mcpLoaded = true;
}
function saveMcpServers() {
  try { localStorage.setItem(MCP_STORAGE_KEY, JSON.stringify(state.mcpServers || [])); }
  catch (e) { console.warn('saveMcpServers failed', e); }
}

function loadCustomSkills() {
  try {
    const raw = localStorage.getItem(CUSTOM_SKILLS_STORAGE_KEY);
    state.customSkills = raw ? JSON.parse(raw) : [];
  } catch (e) {
    state.customSkills = [];
  }
}

function saveCustomSkills() {
  try { localStorage.setItem(CUSTOM_SKILLS_STORAGE_KEY, JSON.stringify(state.customSkills || [])); }
  catch (e) { console.warn('saveCustomSkills failed', e); }
}
function ensureAgentSchema(a) {
  if (!a) return a;
  // 旧值兼容：'main' / 'manager' → 'team'；'sub' / 'member' → 'agent'
  if (a.kind === 'main' || a.kind === 'manager') a.kind = 'team';
  else if (a.kind === 'sub' || a.kind === 'member') a.kind = 'agent';
  if (a.kind !== 'team' && a.kind !== 'agent') a.kind = 'agent';
  // 字段重命名：subAgentIds → teamMemberIds
  if (Array.isArray(a.subAgentIds) && !Array.isArray(a.teamMemberIds)) {
    a.teamMemberIds = a.subAgentIds;
    delete a.subAgentIds;
  }
  if (!Array.isArray(a.teamMemberIds)) a.teamMemberIds = [];
  if (!a.memoryConfig) a.memoryConfig = { strategy:'window', windowSize:10, summaryPrompt:'请将以上对话内容浓缩为一段不超过 200 字的要点摘要，保留关键事实、决策与下一步。', kvNamespace:'' };
  if (!a.planningConfig) a.planningConfig = { mode:'react', stepsTemplate:'1. 理解任务\n2. 拆解步骤\n3. 调用工具\n4. 汇总输出' };
  if (!a.validationConfig) a.validationConfig = { strategy:'none', rules:[], judgePrompt:'请检查以上回答是否覆盖了用户问题的全部要点，列出 missed_points: [] 与 ok: true/false' };
  if (!a.hooks) a.hooks = { preToolUse:'', postToolUse:'', onError:'', onComplete:'' };
  if (!Array.isArray(a.skills)) a.skills = [];
  // MCP Tools 用独立字段，避免和 skills 数组混淆。元素形如 "<serverId>:<toolName>"
  if (!Array.isArray(a.mcpTools)) a.mcpTools = [];
  return a;
}
function ensureMissionSchema(m) {
  if (!m || !m.squad) return m;
  if (!Array.isArray(m.squad.enabledSkills)) m.squad.enabledSkills = [];
  if (!Array.isArray(m.squad.enabledMcpTools)) m.squad.enabledMcpTools = [];
  (m.squad.agents || []).forEach(ensureAgentSchema);
  ensureMissionManager(m);
  return m;
}
// 保证 Mission 内有且仅有 1 个 Team；缺失则首个 Agent 升级，多则保留首个其余降级。
function ensureMissionManager(m) {
  if (!m || !m.squad) return;
  const agents = m.squad.agents || [];
  if (!agents.length) return;
  const teams = agents.filter(a => a.kind === 'team');
  if (teams.length === 0) {
    agents[0].kind = 'team';
  } else if (teams.length > 1) {
    teams.slice(1).forEach(a => { a.kind = 'agent'; });
  }
  // Team.teamMemberIds 首次种子化：默认包含当前 Mission 内所有其它 Agent。
  // 用 _teamSeeded 标记防止用户手动清空后被反复回填。
  const mgr = (m.squad.agents || []).find(a => a.kind === 'team');
  if (mgr && !mgr._teamSeeded) {
    if (!Array.isArray(mgr.teamMemberIds)) mgr.teamMemberIds = [];
    if (mgr.teamMemberIds.length === 0) {
      mgr.teamMemberIds = agents.filter(a => a.id !== mgr.id).map(a => a.id);
    }
    mgr._teamSeeded = true;
  }
}
function getMissionManager(m) {
  if (!m || !m.squad) return null;
  return (m.squad.agents || []).find(a => a.kind === 'team') || null;
}
function ensureAllSchemas() {
  (state.missions || []).forEach(ensureMissionSchema);
  if (!state.mcpLoaded) loadMcpServers();
}

async function createMissionFromTemplate(tplId) {
  const tpl = TEMPLATES.find(t => t.id === tplId);
  if (!tpl) return;
  const missionData = {
    name: tpl.name + ' 副本',
    squad: {
      agents: tpl.agents.map((name,i) => makeAgent(
        name,
        `基于模板「${tpl.name}」生成的子 Agent。`,
        ['description','finance_mode','edit_note','public','difference','event'][i % 6],
        `你是 ${name}，负责协同完成「${tpl.name}」相关子任务。`,
        tpl.skills
      )),
      enabledSkills: tpl.skills,
      coordinator: { name:'Coordinator' }
    }
  };
  
  try {
    // 调用后端API创建mission
    const response = await api('/missions', {
      method: 'POST',
      body: JSON.stringify(missionData)
    });
    
    if (response && response.ok && response.mission) {
      state.missions.unshift(response.mission);
      showToast(`已从模板创建：${response.mission.name}`, 'success');
      openMission(response.mission.id);
    } else {
      // 如果后端API失败，前端临时创建
      const newMission = {
        id: uid('mis'), name: tpl.name + ' 副本', icon: tpl.icon,
        runs: [{ id:'run_current', title:'当前运行', status:'idle', conversation:[], artifact:null }],
        squad: missionData.squad
      };
      state.missions.unshift(newMission);
      showToast(`已从模板创建（本地临时）：${newMission.name}`, 'warning');
      openMission(newMission.id);
    }
  } catch (error) {
    console.error('创建mission失败:', error);
    const newMission = {
      id: uid('mis'), name: tpl.name + ' 副本', icon: tpl.icon,
      runs: [{ id:'run_current', title:'当前运行', status:'idle', conversation:[], artifact:null }],
      squad: missionData.squad
    };
    state.missions.unshift(newMission);
    showToast(`创建失败，已本地创建：${newMission.name}`, 'error');
    openMission(newMission.id);
  }
  render();
}

function renderBubble(msg, idx) {

        </div>
      </div>`;
  }
  if (msg.type === 'system') {
    return `<div class="flex justify-center">
      <div class="text-label-sm text-secondary bg-surface-container rounded-full px-3 py-1">${escapeHTML(msg.text)}</div>
    </div>`;
  }
  if (msg.type === 'rag') {
    const kbNames = (msg.kbIds || []).map(id => (state.kbs.list.find(k=>k.id===id) || {}).name || id).filter(Boolean);
    const collapsed = msg.collapsed !== false;
    return `
      <div class="flex justify-center">
        <div class="w-full max-w-[82%] bg-primary-fixed/20 border border-primary/30 rounded-xl overflow-hidden">
          <button onclick="toggleRagCollapse(${idx})" class="w-full px-md py-2 flex items-center gap-2 text-label-md text-on-surface hover:bg-primary-fixed/30 text-left">
            <span class="material-symbols-outlined text-[16px] text-primary">menu_book</span>
            <span class="font-bold">检索到 ${msg.hits.length} 条上下文</span>
            <span class="text-secondary">·</span>
            <span class="text-secondary truncate">${kbNames.length ? '来自 ' + escapeHTML(kbNames.join(' / ')) : ''}</span>
            <span class="ml-auto text-secondary text-[11px]">query: "${escapeHTML((msg.query||'').slice(0,28))}${(msg.query||'').length>28?'…':''}"</span>
            <span class="material-symbols-outlined text-[16px] text-secondary">${collapsed?'expand_more':'expand_less'}</span>
          </button>
          ${collapsed ? '' : `
            <ol class="px-md py-2 space-y-2 border-t border-primary/20 bg-surface-container-lowest/60 max-h-[280px] overflow-y-auto">
              ${msg.hits.map((h, i) => `
                <li class="border border-outline-variant rounded-lg p-2 bg-surface-container-lowest">
                  <div class="flex items-center gap-1 text-[11px] text-secondary mb-1">
                    <span class="text-on-surface">${escapeHTML(h.docName)}</span>
                    <span>· chunk #${h.chunkIndex}</span>
                    <span class="ml-auto text-primary">score ${h.score}</span>
                  </div>
                  <div class="text-body-md whitespace-pre-wrap text-on-surface">${highlightText((h.text||'').slice(0,400) + ((h.text||'').length>400?'…':''), h.matchedTerms)}</div>
                </li>`).join('')}
            </ol>
          `}
        </div>
      </div>`;
  }
  if (msg.type === 'diff-card') {
    return `<div class="flex justify-center">
      <div class="bg-primary-fixed/30 border border-primary/30 rounded-xl px-md py-2.5 text-label-md text-on-primary-fixed flex items-center gap-2 cursor-pointer hover:bg-primary-fixed/60"
           onclick='openAgentDiff(${JSON.stringify(msg.payload).replace(/'/g,"\\'")})'>
        <span class="material-symbols-outlined text-[16px]">difference</span>
        <span>Coordinator 提议：${escapeHTML(msg.summary)}</span>
        <span class="font-bold ml-2">查看变更 →</span>
      </div>
    </div>`;
  }
  // agent message
  return `
    <div class="flex justify-start">
      <div class="max-w-[82%]">
        <div class="flex items-center gap-2 mb-1">
          <div class="w-6 h-6 rounded-full bg-secondary-container flex items-center justify-center">
            <span class="material-symbols-outlined text-on-surface-variant text-[14px]">${msg.icon || 'smart_toy'}</span>
          </div>
          <span class="text-label-md font-bold text-on-surface">${escapeHTML(msg.agent || 'Agent')}</span>

        ${msg.tool ? `

            </summary>

          </details>` : ''}
      </div>
    </div>`;
}

function formatMentions(text='') {
  // 把 @AgentName / #AgentName 渲染成 chip
  const m = getMission();
  if (!m) return escapeHTML(text);
  let html = escapeHTML(text);
  m.squad.agents.forEach(a => {
    const safeName = a.name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    // # 模式：橙色编辑 chip
    html = html.replace(new RegExp('#' + safeName, 'g'),
      `<span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded text-[11px] font-medium bg-primary text-white"><span class="material-symbols-outlined text-[11px]">edit_square</span>${escapeHTML(a.name)}</span>`);
    // @ 模式：原蓝色 chip
    html = html.replace(new RegExp('@' + safeName, 'g'),
      `<span class="mention-chip">@${escapeHTML(a.name)}</span>`);
  });
  return html;
}

function addAgent() {
  const m = getMission();
  ensureMissionSchema && ensureMissionSchema(m);
  const cur = m.squad.agents || [];
  const hasTeam = cur.some(a => a.kind === 'team');

  if (cur.length === 0) {
    const a = makeAgent(
      'New Team',
      '描述这个 Team 的职责（主协同单元，直接面向用户拆解任务）。',
      'hub',
      '你是 Mission 的 Team 负责人，负责理解用户目标、拆解任务、调度合适的 Agent，并整合最终输出。',
      [],
      'team'
    );
    m.squad.agents.push(a);
    showToast('已新增 Team，请在右侧完成配置', 'success');
    render();
    return;
  }

  if (cur.length === 1 && !hasTeam) {
    cur[0].kind = 'team';
    cur[0].icon = cur[0].icon || 'hub';
    cur[0].systemPrompt = cur[0].systemPrompt || '你是 Mission 的 Team 负责人，负责理解用户目标、拆解任务、调度合适的 Agent，并整合最终输出。';
  }

  const a = makeAgent(
    'New Agent',
    '在这里描述这个 Agent 的职责（由 Team 调起执行的具体子任务）。',
    'smart_toy',
    '你是一名 Agent，专注完成 Team 委派的具体任务。',
    [],
    'agent'
  );
  m.squad.agents.push(a);
  const team = cur.find(x => x.kind === 'team') || m.squad.agents.find(x => x.kind === 'team');
  if (team) {
    team.teamMemberIds = team.teamMemberIds || [];
    if (!team.teamMemberIds.includes(a.id)) team.teamMemberIds.push(a.id);
  }
  showToast('已新增 Agent，请在右侧完成配置', 'success');
  render();
}

async function handleCreateMission() {
  const name = $('#create-mission-name')?.value.trim();
  if (!name) { showToast('请输入任务名称', 'error'); return; }
  const desc = $('#create-mission-desc')?.value.trim() || '';
  
  closeModal('modal-create-mission');
  
  try {
    const response = await api('/missions', {
      method: 'POST',
      body: JSON.stringify({ name, description: desc })
    });
    
    if (response && response.ok && response.mission) {
      state.missions.unshift(response.mission);
      showToast('任务创建成功', 'success');
      openMission(response.mission.id);
    } else {
      throw new Error('后端返回异常');
    }
  } catch (error) {
    console.error('创建任务失败:', error);
    showToast('创建失败：' + (error.message || error), 'error');
  }
}

function applyAgentDiff(agentId, change) {
  const m = (state.detail && state.detail.type === 'agent' && state.detail.missionId)
    ? state.missions.find(x => x.id === state.detail.missionId)
    : getMission();
  const a = m && m.squad.agents.find(x => x.id === agentId);
  if (!a) return;
  // 应用 skill diff
  (change.removedSkills||[]).forEach(s => { const i = a.skills.indexOf(s); if (i>=0) a.skills.splice(i,1); });
  (change.addedSkills||[]).forEach(s => { if (!a.skills.includes(s)) a.skills.push(s); });
  // 应用 prompt diff
  if (change.promptDiff?.length) {
    a.systemPrompt = change.promptDiff
      .filter(l => l.type !== 'remove')
      .map(l => l.text)
      .join('\n');
  }
  // 同步加入到 Mission 启用的 skill 集合
  (change.addedSkills||[]).forEach(s => { if (!m.squad.enabledSkills.includes(s)) m.squad.enabledSkills.push(s); });

  // 若当前正处于 Agent 详情页且就是这个 Agent，则把变更也同步到 draft（避免立刻被 draft 覆盖）
  if (state.detail && state.detail.type === 'agent' && state.detail.agentId === a.id) {
    const draft = state.detail.draft;
    if (draft) {
      draft.skills = [...a.skills];
      draft.systemPrompt = a.systemPrompt;
    }
  }

  const run = getRun();
  if (run) {
    run.conversation.push({
      type:'agent', agent:'Coordinator', icon:'switch_account', time: now(),
      text:`已更新 ${a.name} 的配置。变更立即在下一轮对话生效。`
    });
  }
  state.selectedAgentId = a.id;
  state._highlightAgentId = a.id;
  closeModal('modal-agent-diff');
  render();
  // 高亮闪烁
  setTimeout(() => {
    $$('.agent-connector > div').forEach(el => {
      if (el.textContent.includes(a.name)) el.classList.add('agent-pending');
    });
  }, 30);
  showToast('Agent 配置已更新', 'success');
}

// 共享：把新角色真正插入 Mission，应用 Team 默认的“加进调度链”语义。
function _insertAgentToMission(newAgent, dstMission, opts={}) {
  ensureAgentSchema(newAgent);
  // 第一个角色 → Team；其它 → Agent
  if (dstMission.squad.agents.length === 0) {
    newAgent.kind = 'team';
  } else {
    newAgent.kind = 'agent';
  }
  dstMission.squad.agents.push(newAgent);
  ensureMissionManager(dstMission);

  // 如果当前 Mission 已有 Team 且不是新角色，把它加到 Team 的 teamMemberIds，并同步 Prompt。
  const mgr = getMissionManager(dstMission);
  let intent = null;
  if (mgr && mgr.id !== newAgent.id) {
    if (!Array.isArray(mgr.teamMemberIds)) mgr.teamMemberIds = [];
    if (!mgr.teamMemberIds.includes(newAgent.id)) mgr.teamMemberIds.push(newAgent.id);
    // 如果当前正处于 Team 详情页 draft，同步 draft.teamMemberIds，避免被旧 draft 覆盖
    if (state.detail && state.detail.type === 'agent' && state.detail.agentId === mgr.id && state.detail.draft) {
      const d = state.detail.draft;
      if (!Array.isArray(d.teamMemberIds)) d.teamMemberIds = [];
      if (!d.teamMemberIds.includes(newAgent.id)) d.teamMemberIds.push(newAgent.id);
    }
    intent = buildManagerSyncPromptDiff(mgr, newAgent, dstMission);
  }
  return { intent, mgr };
}

// 从我的库添加（被 Modal 调用）
function addAgentFromLibrary(srcMissionId, srcAgentId, dstMissionId) {
  const dst = state.missions.find(x => x.id === dstMissionId);
  const src = state.missions.find(x => x.id === srcMissionId);
  if (!dst || !src) return;
  const srcAgent = src.squad.agents.find(a => a.id === srcAgentId);
  if (!srcAgent) return;
  const newAgent = cloneAgentForMission(srcAgent, dst);
  const { intent } = _insertAgentToMission(newAgent, dst);
  closeModalAddAgent();
  showToast(`已添加 "${newAgent.name}" 到 Team`, 'success');
  if (intent) setTimeout(() => { state.missionId = dst.id; openModalAgentDiff(intent); }, 100);
  else render();
}

// 用自然语言描述创建（mock 占位）
function createAgentFromNL(dstMissionId) {
  const dst = state.missions.find(x => x.id === dstMissionId);
  if (!dst || !state.addAgentModal) return;
  const text = (state.addAgentModal.nlText || '').trim();
  if (!text) { showToast('请先描述一下想要的 Agent', 'error'); return; }
  // 极简 NL → schema 推断（mock，不调 LLM）
  const guess = guessAgentFromNL(text);
  const newAgent = makeAgent(guess.name, guess.role, guess.icon, guess.systemPrompt, guess.skills, 'agent');
  const { intent } = _insertAgentToMission(newAgent, dst);
  closeModalAddAgent();
  showToast(`已根据描述创建 "${newAgent.name}"，可在详情页精修`, 'success');
  if (intent) setTimeout(() => { state.missionId = dst.id; openModalAgentDiff(intent); }, 100);
  else render();
}

// 极简 NL → Agent schema（不调 LLM 的占位实现）
function guessAgentFromNL(text) {
  const lower = text.toLowerCase();
  // icon 推断
  let icon = 'smart_toy';
  if (/翻译|translate/.test(lower)) icon = 'translate';
  else if (/营销|文案|writer|写/.test(lower)) icon = 'edit_note';
  else if (/财务|financ|金融|分析/.test(lower)) icon = 'finance_mode';
  else if (/sql|database|数据库|查数据/.test(lower)) icon = 'database';
  else if (/code|代码|编程/.test(lower)) icon = 'code';
  else if (/research|搜索|调研/.test(lower)) icon = 'search';
  else if (/审|review|检查/.test(lower)) icon = 'rule';
  // 名字推断：尽量从描述里抓一个名词，或用通用名
  let name = 'Custom Agent';
  if (/翻译/.test(text)) name = 'Translator';
  else if (/财务|金融|财报/.test(text)) name = 'Financial Helper';
  else if (/营销|文案/.test(text)) name = 'Marketing Writer';
  else if (/sql|数据库|查数据/.test(lower)) name = 'Data Querier';
  else if (/调研|搜索|research/.test(lower)) name = 'Researcher';
  else if (/审|review/.test(lower)) name = 'Reviewer';
  else if (/写报告|report/.test(lower)) name = 'Report Writer';
  // skills 简单推断
  const skills = [];
  if (/sql|数据库/.test(lower)) skills.push('sql_query');
  if (/搜索|web|research/.test(lower)) skills.push('web_search');
  if (/写|markdown|report/.test(lower)) skills.push('markdown_write');
  if (/翻译/.test(text)) skills.push('translate');
  return {
    name, role: text.slice(0, 60), icon,
    systemPrompt: `你是一名 ${name}。你的职责：${text}\n请基于 Team 派发的子任务给出高质量、可验证的输出。`,
    skills,
  };
}

function saveMCPSkills() {
  const checks = $$('.mcp-tool-check').filter(c => c.checked);
  const m = getMission();
  checks.forEach(c => {
    const id = c.dataset.id;
    if (!state.customSkills.find(s => s.id === id)) {
      state.customSkills.push({ id, name: c.dataset.name, icon:'extension', desc: c.dataset.desc });
    }
    if (!m.squad.enabledSkills.includes(id)) m.squad.enabledSkills.push(id);
  });
  closeModal('modal-mcp-connect');
  showToast(`已添加 ${checks.length} 个 MCP 技能`, 'success');
  render();
}

/* ===================== Tools 级 MCP Server CRUD ===================== */
function openMcpServerModal(editingId) {
  loadMcpServers();
  const editing = editingId ? (state.mcpServers || []).find(s => s.id === editingId) : null;
  state.mcpEdit = {
    id: editing ? editing.id : null,
    name: editing ? editing.name : '',
    description: editing ? editing.description : '',
    transport: editing ? editing.transport : 'sse',
    endpoint: editing ? (editing.endpoint || '') : '',
    command: editing ? (editing.command || '') : '',
    auth: editing ? (editing.auth || '') : '',
    tools: editing ? (editing.tools || []).slice() : [],
    selectedToolIds: new Set((editing && editing.tools) ? editing.tools.map(t => t.name) : []),
    testStatus: editing && editing.status ? editing.status : 'idle',
    testError: '',
  };
  renderMcpServerModal();
}

function renderMcpServerModal() {
  const root = $('#modal-mcp-connect');
  const m = state.mcpEdit;

    : `<input id="mcp-edit-endpoint" value="${escapeAttr(m.endpoint || '')}" placeholder="${m.transport === 'http' ? 'https://api.example.com/mcp' : 'https://mcp.example.com/sse'}"
        class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:border-primary focus:ring-0 font-mono text-label-md"/>`;

  const statusBlock = (() => {
    if (m.testStatus === 'connected') {
      return `<div class="flex items-center gap-2 text-tertiary text-label-md">
        <span class="material-symbols-outlined text-[18px]">check_circle</span>

        <span class="material-symbols-outlined text-[18px] animate-spin">progress_activity</span>正在握手...
      </div>`;
    }

      return `<div class="flex items-center gap-2 text-error text-label-md">

    }
    return `<p class="text-label-sm text-secondary">填写完成后点击 "测试连接" 探测可用工具。</p>`;
  })();

  const toolsBlock = m.tools.length ? `
    <div>
      <p class="font-label-md text-on-surface mb-2">选择要启用的工具 (${m.selectedToolIds.size}/${m.tools.length})</p>
      <div class="space-y-2 max-h-[200px] overflow-y-auto pr-1">
        ${m.tools.map(t => `
          <label class="flex items-start gap-2 p-2.5 bg-surface-container-low border border-outline-variant rounded-lg cursor-pointer hover:border-primary/40">
            <input type="checkbox" ${m.selectedToolIds.has(t.name) ? 'checked' : ''}

              <p class="text-label-sm text-secondary">${escapeHTML(t.desc || '')}</p>
            </div>
          </label>`).join('')}
      </div>
    </div>` : '';

  root.classList.remove('hidden');
  root.innerHTML = `
    <div class="absolute inset-0 modal-overlay" onclick="closeMcpServerModal()"></div>
    <div class="relative h-full w-full flex items-center justify-center p-lg" onclick="event.stopPropagation()">
      <div class="bg-surface-container-lowest rounded-xl shadow-2xl w-[640px] max-w-full max-h-[88vh] overflow-hidden flex flex-col">

          </div>
          <button onclick="closeMcpServerModal()" class="p-1 rounded hover:bg-surface-container">
            <span class="material-symbols-outlined text-secondary">close</span>
          </button>
        </div>
        <div class="flex-1 overflow-y-auto p-lg space-y-md">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <p class="font-label-md text-on-surface mb-1">名称 <span class="text-error">*</span></p>
              <input id="mcp-edit-name" value="${escapeAttr(m.name)}" placeholder="my-jira-mcp"
                class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:border-primary focus:ring-0"/>
            </div>

                <option value="sse"   ${m.transport==='sse'?'selected':''}>SSE</option>
                <option value="http"  ${m.transport==='http'?'selected':''}>HTTP</option>
                <option value="stdio" ${m.transport==='stdio'?'selected':''}>STDIO</option>
              </select>
            </div>
          </div>
          <div>
            <p class="font-label-md text-on-surface mb-1">${m.transport === 'stdio' ? '启动命令' : 'Endpoint'} <span class="text-error">*</span></p>
            ${transportInput}
          </div>
          <div>
            <p class="font-label-md text-on-surface mb-1">描述</p>
            <textarea id="mcp-edit-desc" rows="2" placeholder="一句话说明这个 Server 的用途"
              class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 text-body-md focus:border-primary focus:ring-0 resize-none">${escapeHTML(m.description || '')}</textarea>
          </div>

function closeMcpServerModal() { state.mcpEdit = null; closeModal('modal-mcp-connect'); }

function onMcpTransportChange(v) {
  state.mcpEdit.transport = v;
  // 切换协议时保留旧 endpoint / command
  syncMcpEditFromForm();
  renderMcpServerModal();
}

function syncMcpEditFromForm() {
  const m = state.mcpEdit; if (!m) return;
  const nameEl = $('#mcp-edit-name');
  if (nameEl) m.name = nameEl.value.trim();
  const descEl = $('#mcp-edit-desc');
  if (descEl) m.description = descEl.value.trim();
  const authEl = $('#mcp-edit-auth');
  if (authEl) m.auth = authEl.value.trim();
  const epEl = $('#mcp-edit-endpoint');
  if (epEl) m.endpoint = epEl.value.trim();
  const cmdEl = $('#mcp-edit-command');
  if (cmdEl) m.command = cmdEl.value.trim();
}

function toggleMcpEditTool(toolName) {
  const m = state.mcpEdit; if (!m) return;
  if (m.selectedToolIds.has(toolName)) m.selectedToolIds.delete(toolName);
  else m.selectedToolIds.add(toolName);
  syncMcpEditFromForm();
  renderMcpServerModal();
}

function testMcpServerInModal() {
  const m = state.mcpEdit; if (!m) return;
  syncMcpEditFromForm();
  if (!m.name) { showToast('请先填写名称', 'error'); return; }
  if (m.transport === 'stdio' ? !m.command : !m.endpoint) {
    showToast(m.transport === 'stdio' ? '请填写启动命令' : '请填写 Endpoint', 'error');
    return;
  }
  m.testStatus = 'testing'; m.testError = '';
  renderMcpServerModal();
  setTimeout(() => {
    // mock：根据名字哈希返回不同的工具集
    const seed = (m.name || '').toLowerCase();
    const presets = [
      [
        { name:'jira_search',  desc:'按 JQL 查询 Jira 工单' },
        { name:'jira_create',  desc:'创建 Jira 工单' },
        { name:'jira_comment', desc:'给工单添加评论' },
      ],
      [
        { name:'github_pr_list',    desc:'列出 Pull Request' },
        { name:'github_pr_review',  desc:'对 PR 添加 Review 评论' },
        { name:'github_issue_open', desc:'创建 Issue' },
      ],
      [
        { name:'slack_send',    desc:'发送 Slack 消息' },
        { name:'slack_history', desc:'读取 Channel 历史' },
      ],
      [
        { name:'fs_read',  desc:'读取文件内容' },
        { name:'fs_write', desc:'写入文件' },
        { name:'fs_list',  desc:'列目录' },
      ],
    ];
    const idx = seed.includes('git') ? 1 : seed.includes('slack') ? 2 : seed.includes('fs') || seed.includes('file') ? 3 : 0;
    m.tools = presets[idx];
    m.selectedToolIds = new Set(m.tools.map(t => t.name));
    m.testStatus = 'connected';
    renderMcpServerModal();
  }, 800);
}

function submitMcpServer() {
  const m = state.mcpEdit; if (!m) return;
  syncMcpEditFromForm();
  if (!m.name) { showToast('请填写名称', 'error'); return; }
  if (m.transport === 'stdio' ? !m.command : !m.endpoint) {
    showToast(m.transport === 'stdio' ? '请填写启动命令' : '请填写 Endpoint', 'error');
    return;
  }
  loadMcpServers();
  const selectedTools = (m.tools || []).filter(t => m.selectedToolIds.has(t.name));
  const payload = {
    name: m.name,
    description: m.description || '',
    transport: m.transport,
    endpoint: m.endpoint || '',
    command: m.command || '',
    auth: m.auth || '',
    tools: selectedTools,
    status: m.testStatus === 'connected' ? 'connected' : 'idle',
    updatedAt: Date.now(),
  };
  if (m.id) {
    const i = state.mcpServers.findIndex(s => s.id === m.id);
    if (i >= 0) state.mcpServers[i] = { ...state.mcpServers[i], ...payload };
  } else {
    payload.id = uid('mcp');
    payload.createdAt = Date.now();
    state.mcpServers.push(payload);
  }
  saveMcpServers();
  closeMcpServerModal();
  showToast(m.id ? 'MCP Server 已更新' : 'MCP Server 已添加', 'success');
  render();
}

function editMcpServer(id) { openMcpServerModal(id); }

function deleteMcpServer(id) {
  loadMcpServers();
  const s = state.mcpServers.find(x => x.id === id);
  if (!s) return;
  if (!confirm(`确定删除 MCP Server "${s.name}"？所有引用此 Server 工具的 Mission 与 Agent 将自动解除引用。`)) return;
  state.mcpServers = state.mcpServers.filter(x => x.id !== id);
  saveMcpServers();
  // 级联清理 mission / agent 引用
  (state.missions || []).forEach(m => {
    ensureMissionSchema(m);
    m.squad.enabledMcpTools = (m.squad.enabledMcpTools || []).filter(k => !k.startsWith(id + ':'));
    (m.squad.agents || []).forEach(a => {
      a.mcpTools = (a.mcpTools || []).filter(k => !k.startsWith(id + ':'));
    });
  });
  showToast('已删除', 'success');
  render();
}

function testMcpServer(id) {
  loadMcpServers();
  const s = state.mcpServers.find(x => x.id === id);
  if (!s) return;
  s.status = 'testing';
  render();
  setTimeout(() => {
    s.status = 'connected';
    saveMcpServers();
    showToast(`"${s.name}" 连接正常 (${(s.tools||[]).length} 工具)`, 'success');
    render();
  }, 700);
}

// 工具：返回所有可在 Agent / Mission 中启用的 MCP Tools，扁平
function getAllMcpTools() {
  loadMcpServers();
  const out = [];
  (state.mcpServers || []).forEach(s => {
    (s.tools || []).forEach(t => {
      out.push({
        key: s.id + ':' + t.name,
        serverId: s.id,
        serverName: s.name,
        name: t.name,
        desc: t.desc || '',
      });
    });
  });
  return out;
}

/* ---- Agents 库自然语言修改入口 ---- */
function submitAgentsLibEdit() {
  const ta = document.getElementById('agents-lib-edit-input');
  if (!ta) return;
  const text = (ta.value || '').trim();
  if (!text) { showToast('请先输入修改指令', 'error'); return; }
  const result = parseEditIntentGlobal(text);
  if (!result) { showToast('未能解析出明确的 Agent 修改意图。可尝试使用 #AgentName 显式指定。', 'error'); return; }
  ta.value = '';
  // 切换 detail 上下文，让 openModalAgentDiff/applyAgentDiff 能定位到正确 Mission
  const prevDetail = state.detail;
  const prevMissionId = state.missionId;
  state.missionId = result.missionId;
  // 给 Diff Modal 一个最小的 detail 锚点：仅设 missionId，不进入 agent_detail 视图
  state.detail = { type: 'agent', missionId: result.missionId, agentId: result.intent.agentId, tab: 'overview', draft: null, dirty: false };
  openModalAgentDiff(result.intent);
  // applyAgentDiff/closeModal 后会再次 render，但 state.view 不变；为了用户取消时也能恢复，我们在弹层关闭后用一次性事件复位
  const root = document.getElementById('modal-agent-diff');
  const restore = () => {
    state.missionId = prevMissionId;
    state.detail = prevDetail;
  };
  // 关闭按钮路径
  const observer = new MutationObserver(() => {
    if (root && root.classList.contains('hidden')) {
      restore();
      observer.disconnect();
    }
  });
  if (root) observer.observe(root, { attributes: true, attributeFilter: ['class'] });
}

// 跨所有 Mission 解析自然语言编辑意图。
// 返回 { intent, missionId } 或 null。
function parseEditIntentGlobal(text) {
  if (!text) return null;
  const prev = state.missionId;
  // 先按 #AgentName 显式优先：跨所有 Mission 找名字最匹配的 Agent，定位它所在 Mission
  const hashM = text.match(/#([^\s#@]+)/);
  if (hashM) {
    const frag = hashM[1].toLowerCase();
    const norm = (s) => s.toLowerCase().replace(/[\s师员]+/g,'');
    let target = null;
    for (const m of state.missions) {
      const hit = m.squad.agents.find(a =>
        a.name.toLowerCase().includes(frag) || norm(a.name).includes(norm(frag))
      );
      if (hit) { target = { mission: m, agent: hit }; break; }
    }
    if (target) {
      state.missionId = target.mission.id;
      try {
        const intent = parseEditIntent(text);
        if (intent) return { intent, missionId: target.mission.id };
      } finally {
        state.missionId = prev;
      }
    }
  }
  // 回退：在每个 Mission 上轮询 parseEditIntent，命中即返回
  for (const m of state.missions) {
    state.missionId = m.id;
    try {
      const intent = parseEditIntent(text);
      if (intent) return { intent, missionId: m.id };
    } finally {
      state.missionId = prev;
    }
  }
  return null;
}

];
const SKILL_CATEGORY_MAP = Object.fromEntries(SKILL_CATEGORIES.map(c => [c.id, c]));

// 合并所有技能（去重），提供给 Skills 页面使用
function normalizedCustomSkills() {
  const builtin = (BUILTIN_SKILLS || []).map(s => buildLocalSkillRecord(s, {
    ...s,
    slug: s.slug || s.id,
    isBuiltin: true,
    isInstalled: true,
    isPublished: true,
    authorName: 'system',
  }));
  const custom = (state.customSkills || []).map(s => buildLocalSkillRecord(s, {
    ...s,
    slug: s.slug || s.id,
    isBuiltin: false,
    isInstalled: true,
    isMine: true,
  }));
  // 去重：以 slug 为键
  const map = new Map();
  [...builtin, ...custom].forEach(s => map.set(s.slug, s));
  return [...map.values()];
}

function getAllSkillRecords() {
  return [...normalizedCustomSkills(), ...(state.skills.mine || []), ...(state.skills.market || [])];
}

function findSkillRecord(skillRef) {
  if (skillRef == null || skillRef === "") return null;
  return getAllSkillRecords().find(s => s.id === skillRef || s.slug === skillRef || ("builtin_" + s.slug) === skillRef) || null;
}

function makeUniqueSkillSlug(base) {
  const taken = new Set(getAllSkillRecords().map(s => s.slug || s.id));
  const seed = String(base || "skill").toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "").replace(/_+/g, "_") || "skill";
  let slug = seed;
  let i = 2;
  while (taken.has(slug)) slug = seed + "_" + i++;
  return slug;
}

function buildLocalSkillRecord(base, overrides={}) {
  const original = base || {};
  const slug = overrides.slug || makeUniqueSkillSlug(overrides.slugSeed || overrides.name || original.slug || original.id || "skill");
  const ts = new Date().toISOString().replace("T", " ").slice(0,19);
  return {
    id: slug,
    slug,
    name: overrides.name || original.name || slug,
    icon: overrides.icon || original.icon || "extension",
    description: overrides.description || original.description || original.desc || "",
    desc: overrides.description || original.description || original.desc || "",
    code: overrides.code ?? original.code ?? "",
    readme: overrides.readme ?? original.readme ?? "",
    category: overrides.category || original.category || "custom",
    authorName: state.user ? state.user.username : "Guest",
    isPublished: false,
    isMine: true,
    isInstalled: true,
    isBuiltin: false,
    isLocalCustom: true,
    parentId: original.id || null,
    installCount: 0,
    updatedAt: ts,
    versions: (original.versions || []).slice(),
  };
}

function upsertLocalSkillRecord(skill) {
  const idx = (state.customSkills || []).findIndex(x => (x.id || x.slug) === (skill.id || skill.slug));
  const normalized = { ...skill, id: skill.id || skill.slug, slug: skill.slug || skill.id, desc: skill.description || skill.desc || "" };
  if (idx >= 0) state.customSkills[idx] = normalized;
  else state.customSkills.push(normalized);
  saveCustomSkills();
  return normalized;
}

function updateAgentSkillReference(agent, oldSkillId, newSkillId) {
  if (!agent || !Array.isArray(agent.skills)) return;
  agent.skills = agent.skills.map(s => s === oldSkillId ? newSkillId : s);
}

function replaceSkillAcrossAllAgents(oldSkillId, newSkillId) {
  state.missions.forEach(m => m.squad.agents.forEach(a => updateAgentSkillReference(a, oldSkillId, newSkillId)));
  (state.agentMarket || []).forEach(a => updateAgentSkillReference(a, oldSkillId, newSkillId));
}

// 给 Mission 右栏使用的统一 skill 列表（同步源）
function getAllSkills() {
  const fromMine = (state.skills.mine || []).map(s => ({ id: s.slug, name: s.name, icon: s.icon, desc: s.description }));
  const fromCustom = normalizedCustomSkills().map(s => ({ id: s.slug, name: s.name, icon: s.icon, desc: s.description }));
  // 去重：以 slug/id 为键
  const map = new Map();
  [...fromMine, ...fromCustom].forEach(s => map.set(s.id, s));
  return [...map.values()];
}

async function loadSkills() {
  try {
    const market = await api('/skills/market');
    state.skills.market = market.skills || [];
    if (state.user) {
      const mine = await api('/skills/mine');
      state.skills.mine = mine.skills || [];
    } else {
      state.skills.mine = [];
    }
    state.skills.loaded = true;
    render();
  } catch (e) {
    console.warn('loadSkills failed', e);
    showToast && showToast('Skill 列表加载失败：' + (e.message || e));
  }
}

function renderSkillCard(s, tab) {
  const cat = SKILL_CATEGORY_MAP[s.category] || SKILL_CATEGORY_MAP.custom;
  const isBuiltin = s.isBuiltin;
  const isMine = s.isMine;
  const isPublished = s.isPublished;
  const isInstalled = s.isInstalled;

  // 状态徽标
  let badge;
  if (isBuiltin)        badge = `<span class="text-[10px] px-1.5 py-0.5 rounded bg-secondary-container text-on-surface-variant font-medium">内置</span>`;
  else if (isMine && isPublished) badge = `<span class="text-[10px] px-1.5 py-0.5 rounded bg-green-100 text-green-700 font-medium">已发布</span>`;
  else if (isMine)      badge = `<span class="text-[10px] px-1.5 py-0.5 rounded bg-amber-100 text-amber-700 font-medium">私有</span>`;
  else if (isInstalled) badge = `<span class="text-[10px] px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 font-medium">已安装</span>`;
  else                  badge = `<span class="text-[10px] px-1.5 py-0.5 rounded bg-surface-container text-secondary font-medium">未安装</span>`;

  // 按钮组（每个按钮都加 onclick="event.stopPropagation()" 阻止冒泡到卡片）
  const stop = "event.stopPropagation();";
  let buttons;
  if (isBuiltin) {
    buttons = `<button onclick="${stop}" class="flex-1 px-2 py-1.5 rounded text-label-sm bg-surface-container text-secondary cursor-default" disabled>已内置</button>`;
  } else if (tab === 'mine' && isMine) {
    const pubBtn = isPublished
      ? `<button onclick="${stop} unpublishSkill(${s.id})" class="px-2 py-1.5 rounded text-label-sm border border-outline-variant text-on-surface-variant hover:bg-surface-container-low" title="撤回发布">撤回</button>`
      : `<button onclick="${stop} publishSkill(${s.id})" class="px-2 py-1.5 rounded text-label-sm bg-primary text-white hover:opacity-90" title="发布到市场">发布</button>`;
    buttons = `
      <button onclick="${stop} openSkillDetail(${s.id})" class="flex-1 px-2 py-1.5 rounded text-label-sm border border-outline-variant text-on-surface hover:bg-surface-container-low flex items-center justify-center gap-1">
        <span class="material-symbols-outlined text-[14px]">edit</span>编辑
      </button>
      ${pubBtn}
      <button onclick="${stop} deleteSkill(${s.id})" class="px-2 py-1.5 rounded text-label-sm border border-outline-variant text-error hover:bg-error/10" title="删除"><span class="material-symbols-outlined text-[14px]">delete</span></button>`;
  } else if (tab === 'mine') {
    buttons = `<button onclick="${stop}" class="flex-1 px-2 py-1.5 rounded text-label-sm bg-surface-container text-secondary" disabled>已安装</button>`;
  } else {
    buttons = isInstalled
      ? `<button onclick="${stop}" class="flex-1 px-2 py-1.5 rounded text-label-sm bg-secondary-container text-on-surface-variant cursor-default" disabled>已安装</button>`
      : `<button onclick="${stop} installSkill(${s.id})" class="flex-1 px-2 py-1.5 rounded text-label-sm bg-primary text-white hover:opacity-90 flex items-center justify-center gap-1">
           <span class="material-symbols-outlined text-[14px]">download</span>安装
         </button>`;
    if (isMine) {
      buttons = `<button onclick="${stop} openSkillDetail(${s.id})" class="flex-1 px-2 py-1.5 rounded text-label-sm border border-outline-variant text-on-surface hover:bg-surface-container-low">编辑</button>`;
    }
  }

  // 整卡片可点击（内置无详情页，弹提示）
  const cardClick = isBuiltin
    ? `onclick="showToast('内置 Skill 暂无详情页（不可编辑）','info')"`
    : `onclick="openSkillDetail(${s.id})"`;

  return `
    <div ${cardClick} class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md hover:border-primary/40 transition-colors flex flex-col gap-2 cursor-pointer group">
      <div class="flex items-start gap-3">
        <div class="w-10 h-10 rounded-lg bg-primary-fixed/40 flex items-center justify-center shrink-0">
          <span class="material-symbols-outlined text-primary text-[20px]">${escapeHTML(s.icon||'extension')}</span>

        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-1.5">
            <p class="font-label-md text-on-surface truncate">${escapeHTML(s.name)}</p>
            ${badge}
          </div>
          <p class="text-label-sm text-secondary truncate">@${escapeHTML(s.authorName||'system')} · ${cat.name}</p>
        </div>
      </div>
      <p class="text-body-md text-secondary line-clamp-2 min-h-[40px]">${escapeHTML(s.description||'—')}</p>
      <div class="flex items-center justify-between text-[10px] text-secondary">
        <span class="${cat.color} px-1.5 py-0.5 rounded">${cat.name}</span>
        <span class="flex items-center gap-2">
          ${tab==='market' ? `<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[12px]">download</span>${s.installCount||0}</span>` : ''}
          ${(s.versions && s.versions.length) ? `<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[12px]">history</span>${s.versions.length}</span>` : ''}

  let editing;
  if (skillId != null) {
    editing = (state.skills.mine || []).find(s => s.id === skillId)
           || (state.skills.market || []).find(s => s.id === skillId);
    if (!editing) { showToast('Skill 不存在或无权编辑'); return; }
  }
  state.skillEdit = editing
    ? { id:editing.id, slug:editing.slug, name:editing.name, icon:editing.icon, description:editing.description, code:editing.code||'', category:editing.category, isPublished:editing.isPublished }
    : { slug:'', name:'', icon:'extension', description:'', code:'', category:'custom', isPublished:false };

  const root = document.getElementById('modal-skill-edit') || (function(){
    const el = document.createElement('div');

    el.className = 'hidden';

  renderSkillEditModal(root);
}

async function commitSkillSave(publishAfter) {
  const e = state.skillEdit; if (!e) return;
  if (!/^[a-z][a-z0-9_]{1,30}$/.test(e.slug)) return showToast('slug 格式错误：以小写字母开头 + a-z0-9_，2-30 字符');
  if (!e.description || e.description.length < 2) return showToast('请填写描述');
  const isCreate = e.id == null;
  const createdSlug = e.slug;
  const attachToCurrentAgent = !!state.attachCreatedSkillToCurrentAgent && isCreate && !!state.detail && state.detail.type === 'agent';
  try {
    if (e.id != null) {
      // 更新
      await api('/skills/' + e.id, { method:'PUT', body: JSON.stringify({
        name: e.name || e.slug, icon: e.icon, description: e.description, code: e.code || '', category: e.category
      })});
      if (publishAfter && !e.isPublished) {
        await api('/skills/' + e.id + '/publish', { method:'POST' });
      }
      showToast('已保存');
    } else {
      // 新建
      await api('/skills', { method:'POST', body: JSON.stringify({
        slug: e.slug, name: e.name || e.slug, icon: e.icon, description: e.description,
        code: e.code || '', category: e.category, publish: !!publishAfter
      })});
      showToast(publishAfter ? '已创建并发布到市场' : '已创建为私有 Skill');
    }
    await loadSkills();
    if (attachToCurrentAgent && state.detail && state.detail.type === 'agent') {
      const created = getAllSkills().find(s => s.id === createdSlug);
      if (created && !state.detail.draft.skills.includes(created.id)) {
        state.detail.draft.skills.push(created.id);
        markDetailDirty();

/* ============================================================
   Markdown 极简渲染器（# / ## / ### / **bold** / *em* / `code` / -list）
============================================================ */
function renderMarkdown(md='') {
  if (!md) return '<p class="text-secondary italic">（无内容）</p>';
  let html = escapeHTML(md);
  // 代码块 ```
  html = html.replace(/```([\s\S]*?)```/g, (_, c) => `<pre class="bg-surface-container p-2 rounded my-2 text-[12px] font-mono overflow-x-auto">${c.replace(/^\n/, '')}</pre>`);
  html = html
    .replace(/^### (.+)$/gm, '<h3 class="text-title-md font-headline-md mt-4 mb-1">$1</h3>')
    .replace(/^## (.+)$/gm,  '<h2 class="text-title-lg font-headline-md mt-4 mb-2">$1</h2>')
    .replace(/^# (.+)$/gm,   '<h1 class="text-headline-md font-headline-md mt-4 mb-2">$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,    '<em>$1</em>')
    .replace(/`([^`]+)`/g,    '<code class="bg-surface-container px-1 rounded text-[12px]">$1</code>')
    .replace(/^- (.+)$/gm,    '<li class="ml-5 list-disc">$1</li>')
    .replace(/(<li[\s\S]*?<\/li>\n?)+/g, m => `<ul class="my-2">${m}</ul>`)
    .split(/\n{2,}/).map(p => /^<(h\d|ul|pre)/.test(p.trim()) ? p : `<p class="my-2 leading-relaxed">${p.replace(/\n/g,'<br/>')}</p>`).join('');
  return html;
}

function openAgentDetail(missionId, agentId, source="mine") {

/* ========== Backend Agent 与详情页 draft 字段映射 ========== */
/* ---- A 档：前端策略 ID 与后端枚举的双向映射表 ---- */
const MEMORY_FE_TO_BE  = { none:'none', window:'sliding_window', summary:'summary' };
const MEMORY_BE_TO_FE  = { none:'none', sliding_window:'window', summary:'summary' };
const PLANNING_FE_TO_BE = { none:'direct', react:'react', plan:'plan_execute' };
const PLANNING_BE_TO_FE = { direct:'none', react:'react', plan_execute:'plan' };
const VALIDATION_FE_TO_BE = { none:'none', rule:'rules', llm:'llm_judge' };
const VALIDATION_BE_TO_FE = { none:'none', rules:'rule', llm_judge:'llm' };

function _beMemoryToFe(be) {
  if (!be || typeof be !== 'object') return {};
  const feStrategy = MEMORY_BE_TO_FE[be.strategy] || be.strategy || 'window';
  const fe = { strategy: feStrategy };
  if (be.window_size != null) fe.windowSize = be.window_size;
  if (be.summary_prompt) fe.summaryPrompt = be.summary_prompt;
  if (be.summary_threshold != null) fe.summaryThreshold = be.summary_threshold;
  return fe;
}
function _fePlanningToBe(fe) {
  if (!fe || typeof fe !== 'object' || !fe.mode) return null;
  const mode = PLANNING_FE_TO_BE[fe.mode];
  // B 档（tree）—— 不下发后端
  if (!mode) return null;
  const out = { mode };
  if (fe.stepsTemplate) out.steps_template = fe.stepsTemplate;
  return out;
}
function _bePlanningToFe(be) {
  if (!be || typeof be !== 'object') return {};
  const fe = { mode: PLANNING_BE_TO_FE[be.mode] || 'react' };
  if (be.steps_template) fe.stepsTemplate = be.steps_template;
  return fe;
}
function _feMemoryToBe(fe) {
  if (!fe || typeof fe !== 'object' || !fe.strategy) return null;
  const strategy = MEMORY_FE_TO_BE[fe.strategy];
  // B 档（kv）—— 不下发
  if (!strategy) return null;
  const out = { strategy };
  if (strategy === 'sliding_window') {
    out.window_size = parseInt(fe.windowSize) || 10;
  } else if (strategy === 'summary') {
    if (fe.summaryPrompt) out.summary_prompt = fe.summaryPrompt;
    if (fe.summaryThreshold != null) out.summary_threshold = parseInt(fe.summaryThreshold) || 4000;
  }
  return out;
}
function _beValidationToFe(be) {
  if (!be || typeof be !== 'object') return {};
  const fe = { strategy: VALIDATION_BE_TO_FE[be.strategy] || 'none' };
  if (Array.isArray(be.rules)) {
    // 后端是 [{type:'regex', pattern, message}] —— 转为前端字符串数组（暂只显示 pattern）
    fe.rules = be.rules.map(r => (r && typeof r === 'object') ? (r.pattern || '') : String(r||''));
  }
  if (be.judge_prompt) fe.judgePrompt = be.judge_prompt;
  if (be.max_retries != null) fe.maxRetries = be.max_retries;
  return fe;
}
function _feValidationToBe(fe) {
  if (!fe || typeof fe !== 'object' || !fe.strategy) return null;
  const strategy = VALIDATION_FE_TO_BE[fe.strategy];
  // B 档（human）—— 不下发
  if (!strategy) return null;
  const out = { strategy };
  if (strategy === 'rules') {
    out.rules = (Array.isArray(fe.rules) ? fe.rules : [])
      .map(s => String(s||'').trim())
      .filter(Boolean)
      .map(pat => ({ type:'regex', pattern: pat }));
  } else if (strategy === 'llm_judge') {
    if (fe.judgePrompt) out.judge_prompt = fe.judgePrompt;
  }
  if (fe.maxRetries != null) out.max_retries = parseInt(fe.maxRetries) || 0;
  return out;
}

function backendAgentToDetailShape(raw) {
  return {
    id: raw.agent_id,
    agent_id: raw.agent_id,
    name: raw.name || '',
    role: raw.description || '',
    icon: raw.icon || 'smart_toy',
    model: raw.llm_adapter || raw.model || 'tongyi',
    kind: 'agent',
    systemPrompt: raw.system_prompt || raw.systemPrompt || '',
    skills: Array.isArray(raw.tools) ? [...raw.tools] : (Array.isArray(raw.skills) ? [...raw.skills] : []),
    mcpTools: [],
    teamMemberIds: [],
    versions: [],
    readme: '',
    // A 档：3 类配置 backends→draft（snake_case + backends 枚举 → camelCase + 前端 id）
    memoryConfig: _beMemoryToFe(raw.memory_config),
    planningConfig: _bePlanningToFe(raw.planning_config),
    validationConfig: _beValidationToFe(raw.validation_config),
    updatedAt: raw.updated_at || raw.created_at || Date.now(),
    _source: 'backend',
    _backendOriginal: raw
  };
}

function detailDraftToBackendPayload(draft) {
  return {
    name: (draft.name || '').trim(),
    icon: draft.icon || 'smart_toy',
    description: draft.role || '',
    system_prompt: draft.systemPrompt || '',
    llm_adapter: draft.model || 'tongyi',
    tools: Array.isArray(draft.skills) ? draft.skills : [],
    // A 档：draft→backends（前端 id → 后端枚举），B 档子类（kv/tree/human）会被转成 null 不下发
    memory_config: _feMemoryToBe(draft.memoryConfig),
    planning_config: _fePlanningToBe(draft.planningConfig),
    validation_config: _feValidationToBe(draft.validationConfig)
  };
}

function cloneAgentForDraft(a) {
  ensureAgentSchema(a);
  return {
    name: a.name, role: a.role, icon: a.icon, model: a.model,
    kind: a.kind || 'agent',
    systemPrompt: a.systemPrompt || '',
    skills: [...(a.skills||[])],
    mcpTools: [...(a.mcpTools||[])],
    teamMemberIds: [...(a.teamMemberIds||[])],
    memoryConfig:    JSON.parse(JSON.stringify(a.memoryConfig    || {})),
    planningConfig:  JSON.parse(JSON.stringify(a.planningConfig  || {}))
  };
}

function getCurrentAgent() {
  if (!state.detail || state.detail.type !== "agent") return null;
  if (state.detail.source === "market") {
    return (state.agentMarket || []).find(x => x.id === state.detail.agentId) || null;
  }
  if (state.detail.source === "backend") {
    const raw = (state.customAgents || []).find(x =>
      String(x.agent_id || x.id) === String(state.detail.agentId)
    );
    return raw ? backendAgentToDetailShape(raw) : null;
  }
  const m = state.missions.find(x => x.id === state.detail.missionId);
  return m && m.squad.agents.find(x => x.id === state.detail.agentId);
}

// 此 Agent (按 id) 出现在哪些 Mission（如果共享了 id；多数情况只在自己创建的那一个）
// 进一步：按"同名"也算"相关"（演示数据中 Agent 是 Mission 内独立创建的，没有跨 Mission 同 ID 的）
function getAgentRelatedMissions(agent) {
  if (!agent) return [];
  const relatedById   = state.missions.filter(m => m.squad.agents.some(a => a.id === agent.id));
  const relatedByName = state.missions.filter(m => m.squad.agents.some(a => a.name === agent.name && a.id !== agent.id));
  // 去重，id 优先
  const map = new Map();
  relatedById.forEach(m => map.set(m.id, { mission: m, viaName: false }));
  relatedByName.forEach(m => { if (!map.has(m.id)) map.set(m.id, { mission: m, viaName: true }); });
  return [...map.values()];
}

/* ---- A 档：3 类配置的自然语言解析（轻量正则）----
 * 命中后直接改写 draft.*Config + markDetailDirty + render，返回 true。
 * 未命中返回 false，调用方再走原 parseEditIntent 走 Diff 弹窗流程。
 */
function tryApplyConfigNLEdit(raw, draft) {
  if (!raw || !draft) return false;
  const txt = String(raw);
  let hit = null;

  // ---------- 记忆 ----------
  // 关闭记忆 / 不保留记忆 / 清空记忆
  if (/(关闭|不保留|清空|去掉)\s*(对话)?\s*(记忆|memory|历史)/i.test(txt)) {
    draft.memoryConfig = { strategy: 'none' };
    hit = '已切换记忆策略为「不保留」';
  }
  // 滑动窗口 N 轮
  else if (/(滑动窗口|sliding[ _-]?window|最近\s*\d+\s*轮)/i.test(txt)) {
    const m = txt.match(/(\d+)\s*(轮|条|条对话)/);
    const n = m ? Math.max(1, Math.min(100, parseInt(m[1]))) : 10;
    draft.memoryConfig = { strategy: 'window', windowSize: n };
    hit = `已切换记忆策略为「滑动窗口」，窗口 ${n} 轮`;
  }
  // 摘要 / summary
  else if (/(摘要|压缩|summary)/i.test(txt) && /(记忆|memory|对话|历史)/i.test(txt)) {
    draft.memoryConfig = Object.assign({}, draft.memoryConfig, { strategy: 'summary' });
    hit = '已切换记忆策略为「摘要压缩」';
  }

  // ---------- 规划 ----------
  if (!hit) {
    if (/(直接回答|不规划|direct)/i.test(txt) && /(规划|planning|模式)/i.test(txt)) {
      draft.planningConfig = { mode: 'none' };
      hit = '已切换规划模式为「直接回答」';
    } else if (/(react|思考[\-\s]?行动|reasoning\s*and\s*acting)/i.test(txt)) {
      draft.planningConfig = { mode: 'react' };
      hit = '已切换规划模式为「ReAct」';
    } else if (/(plan[\-\s]?execute|先规划再执行|分步执行|计划再执行)/i.test(txt)) {
      draft.planningConfig = Object.assign({}, draft.planningConfig, { mode: 'plan' });
      hit = '已切换规划模式为「Plan-Execute」';
    }
  }

  // ---------- 校验 ----------
  if (!hit) {
    if (/(关闭|不要|去掉)\s*(校验|validation|审查)/i.test(txt)) {
      draft.validationConfig = { strategy: 'none' };
      hit = '已切换校验策略为「不校验」';
    } else if (/(规则\s*校验|正则\s*校验|rule|regex)/i.test(txt)) {
      draft.validationConfig = Object.assign({}, draft.validationConfig, { strategy: 'rule', rules: draft.validationConfig?.rules || [] });
      hit = '已切换校验策略为「规则校验」';
    } else if (/(llm\s*judge|llm\s*评审|让\s*llm\s*判定|大模型\s*评审)/i.test(txt)) {
      draft.validationConfig = Object.assign({}, draft.validationConfig, { strategy: 'llm' });
      hit = '已切换校验策略为「LLM Judge」';
    }
  }

  if (!hit) return false;
  markDetailDirty();
  render();
  showToast(hit + '，请在右侧 Tab 中确认细节并点击保存。', 'success');
  return true;
}


async function renderAgentDetailNLEdit() {
  if (!state.detail || state.detail.type !== 'agent') return;
  const ta = document.getElementById('agent-detail-nl-input');
  if (!ta) return;
  const raw = (ta.value || '').trim();
  if (!raw) { showToast('请先输入修改指令', 'error'); return; }
  const draft = state.detail.draft;
  const a = getCurrentAgent();
  if (!a || !draft) return;

  // A 档：先尝试用 NL 调整 3 类配置（memory / planning / validation），命中即直接改 draft + render
  if (tryApplyConfigNLEdit(raw, draft)) {
    ta.value = '';
    return;
  }

  // 强制锁定到当前 Agent：把 # 前缀替换为当前 Agent 名
  let text = raw.replace(/^\s*#[^\s#@]+\s*/, '');
  text = `#${draft.name} ` + text;
  // missionId 已经匹配 state.missionId / state.detail.missionId；parseEditIntent 默认用 getMission()
  // 临时同步 state.missionId 以确保 parseEditIntent 与 openModalAgentDiff 都定位到当前 Mission
  const prevMid = state.missionId;
  state.missionId = state.detail.missionId;
  let intent = null;
  try { intent = parseEditIntent(text); } finally {}
  if (!intent) {
    state.missionId = prevMid;
    showToast('未能解析出明确的修改意图。可换一种说法，或直接编辑左侧表单。', 'error');
    return;
  }
  // 双重保险：强制 intent.agentId = 当前 Agent
  if (intent.agentId !== a.id) intent.agentId = a.id;
  ta.value = '';
  openModalAgentDiff(intent);
  // 关闭后恢复 missionId
  const root = document.getElementById('modal-agent-diff');
  if (root) {
    const observer = new MutationObserver(() => {
      if (root.classList.contains('hidden')) {
        state.missionId = prevMid;
        observer.disconnect();
      }
    });
    observer.observe(root, { attributes: true, attributeFilter: ['class'] });
  } else {
    state.missionId = prevMid;
  }
}

function removeTeamMember(memberId) {
  const draft = state.detail && state.detail.draft;
  if (!draft) return;
  if (!Array.isArray(draft.teamMemberIds)) draft.teamMemberIds = [];
  const i = draft.teamMemberIds.indexOf(memberId);
  if (i >= 0) draft.teamMemberIds.splice(i, 1);
  markDetailDirty(); render();
}

// 直接添加 Mission 内已存在的某个 Agent id 到调度链；触发 Team Prompt 同步 Diff Modal。
function addTeamMember(memberId, opts={}) {
  const draft = state.detail && state.detail.draft;
  if (!draft) return;
  const m = state.missions.find(x => x.id === state.detail.missionId);
  if (!m) return;
  if (!Array.isArray(draft.teamMemberIds)) draft.teamMemberIds = [];
  if (draft.teamMemberIds.includes(memberId)) return;
  const newMember = m.squad.agents.find(x => x.id === memberId);
  if (!newMember) return;
  draft.teamMemberIds.push(memberId);
  markDetailDirty(); render();
  if (opts.silent) return;
  // 自动同步：弹出 Team System Prompt 补丁
  const intent = buildManagerSyncPromptDiff(draft, newMember, m);
  if (intent) {
    setTimeout(() => openModalAgentDiff(intent), 100);
  }
}

// 兼容旧调用：依赖现有 teamMemberIds 是否包含 memberId 决定 add / remove
function toggleTeamMember(memberId) {
  const draft = state.detail && state.detail.draft;
  if (!draft) return;
  if (!Array.isArray(draft.teamMemberIds)) draft.teamMemberIds = [];
  if (draft.teamMemberIds.includes(memberId)) removeTeamMember(memberId);
  else addTeamMember(memberId);
}

// 从「我的库」（其它 Mission）添加 Agent：浅拷贝一份进当前 Mission 的 squad，再加入 Team 调度链。
function addTeamMemberFromLibrary(fromMissionId, srcAgentId) {
  const draft = state.detail && state.detail.draft;
  if (!draft) return;
  const dstMission = state.missions.find(x => x.id === state.detail.missionId);
  const srcMission = state.missions.find(x => x.id === fromMissionId);
  if (!dstMission || !srcMission) return;
  const src = srcMission.squad.agents.find(a => a.id === srcAgentId);
  if (!src) return;
  const newAgent = cloneAgentForMission(src, dstMission);
  dstMission.squad.agents.push(newAgent);
  ensureAgentSchema(newAgent);
  // 加入调度链 + 弹出 Prompt 同步 Diff
  if (!Array.isArray(draft.teamMemberIds)) draft.teamMemberIds = [];
  draft.teamMemberIds.push(newAgent.id);
  markDetailDirty(); render();
  const intent = buildManagerSyncPromptDiff(draft, newAgent, dstMission);
  if (intent) setTimeout(() => openModalAgentDiff(intent), 100);
  showToast(`已从你的 Agent 库添加 "${newAgent.name}"`);
}

function addTeamMemberFromMarket(marketAgentId) {
  const draft = state.detail && state.detail.draft;

}

/* ---- Library / Market 推荐 & 工具 ---- */
function cloneAgentForMission(src, dstMission) {
  // 解决潜在重名冲突：在当前 Mission 中已有同名 Agent 时加后缀
  const existsName = (n) => dstMission.squad.agents.some(a => a.name === n);
  let name = src.name;
  if (existsName(name)) {
    let suffix = 2;
    while (existsName(`${src.name} (${suffix})`)) suffix++;
    name = `${src.name} (${suffix})`;
  }
  return {
    id: 'a_' + Math.random().toString(36).slice(2, 10),
    name,
    role: src.role || '',
    icon: src.icon || getAgentKindMeta(src.kind || 'agent').icon,
    model: src.model || 'GPT-4o mini',
    kind: 'agent',  // 插入 Mission 时会由 _insertAgentToMission 决定最终类型
    systemPrompt: src.systemPrompt || (src.kind === 'team'
      ? `你是 ${src.name} 的 Team 负责人。${src.role || ''}`
      : `你是一名 ${src.name}。${src.role || ''}`),
    skills: [...(src.skills || [])],
    mcpTools: [...(src.mcpTools || [])],
    teamMemberIds: [],
    memoryConfig: src.memoryConfig ? JSON.parse(JSON.stringify(src.memoryConfig)) : {
      strategy:'window', windowSize:10,
      summaryPrompt:'请将以上对话内容浓缩为一段不超过 200 字的要点摘要，保留关键事实、决策与下一步。',
      kvNamespace:'',
    },
    planningConfig:   src.planningConfig   ? JSON.parse(JSON.stringify(src.planningConfig))   : {},
    validationConfig: src.validationConfig ? JSON.parse(JSON.stringify(src.validationConfig)) : {},
    hooks:            src.hooks            ? JSON.parse(JSON.stringify(src.hooks))            : {},
    readme: src.readme || '',
    versions: [],
    ownerId: null,
    updatedAt: Date.now(),
  };
}

// 用户的"Agent 库"：跨 Mission 收集所有 Agent（去重 + 排除当前 Mission 已有 + 排除 excludeIds）
function getMyLibraryAgents(currentMissionId, excludeIds, query, manager) {
  const out = [];
  const seenName = new Set();
  state.missions.forEach(mm => {
    if (mm.id === currentMissionId) return;
    mm.squad.agents.forEach(a => {
      if (excludeIds.has(a.id)) return;
      if (seenName.has(a.name)) return;
      // 跨 Mission 同名 Agent 也不重复推荐（按名字去重）
      // 当前 Mission 内同名也排除
      const dstMission = state.missions.find(x => x.id === currentMissionId);
      if (dstMission && dstMission.squad.agents.some(x => x.name === a.name)) return;
      seenName.add(a.name);
      out.push({
        id: a.id, name: a.name, role: a.role, icon: a.icon, skills: a.skills || [], kind: a.kind,
        fromMissionId: mm.id, fromMissionName: mm.name,
        _score: scoreAgentMatch(manager, a, query),
      });
    });
  });
  // 加上后端自建 Agent（customAgents）
  (state.customAgents || []).forEach(a => {
    const agentKey = a.agent_id || `backend_${a.id}`;
    if (excludeIds.has(agentKey)) return;
    if (seenName.has(a.name)) return;
    seenName.add(a.name);
    out.push({
      id: agentKey,
      name: a.name,
      role: a.description || a.system_prompt || '',
      icon: a.icon || 'smart_toy',
      skills: a.tools || [],
      kind: 'agent',
      model: a.llm_adapter || 'GPT-4o mini',
      fromCustomAgent: true,
      _score: scoreAgentMatch(manager, { name: a.name, role: a.description || '', skills: a.tools || [] }, query),
    });
  });
  // 搜索过滤
  const filtered = query ? out.filter(x => agentMatchesQuery(x, query)) : out;
  return filtered.sort((x, y) => y._score - x._score);
}

// 从后端自定义 Agent 库添加（被添加 Agent 弹窗调用）
function addAgentFromCustomAgent(customAgentId, dstMissionId) {
  const dst = state.missions.find(x => x.id === dstMissionId);
  const src = (state.customAgents || []).find(a => String(a.agent_id || a.id) === String(customAgentId));
  if (!dst || !src) return;
  const newAgent = cloneAgentForMission({
    name: src.name,
    role: src.description || src.system_prompt || '',
    icon: src.icon || 'smart_toy',
    skills: src.tools || [],
    model: src.llm_adapter || 'GPT-4o mini',
    kind: 'agent'
  }, dst);
  const { intent } = _insertAgentToMission(newAgent, dst);
  closeModalAddAgent();
  showToast(`已添加 "${newAgent.name}" 到 Team`, 'success');
  if (intent) setTimeout(() => { state.missionId = dst.id; openModalAgentDiff(intent); }, 100);
  else render();
}

function getRecommendedAgents(manager, excludeIds, query) {
  const market = state.agentMarket || [];
  const filtered = market
    .filter(x => !excludeIds.has(x.id))
    .map(x => ({ ...x, _score: scoreAgentMatch(manager, x, query) }))
    .filter(x => !query || agentMatchesQuery(x, query));
  return filtered.sort((x, y) => y._score - x._score);
}

function agentMatchesQuery(x, q) {
  q = q.toLowerCase();
  if ((x.name || '').toLowerCase().includes(q)) return true;
  if ((x.role || '').toLowerCase().includes(q)) return true;
  if (Array.isArray(x.skills) && x.skills.some(s => (s || '').toLowerCase().includes(q))) return true;
  return false;
}

// 极简评分：manager.role + skills 与候选的 role/skills 关键词重合度
function scoreAgentMatch(manager, candidate, query) {
  let s = candidate.installCount ? Math.min(candidate.installCount / 1000, 5) : 0;
  if (!manager) return s;
  const mgrTokens = ((manager.role || '') + ' ' + (manager.skills || []).join(' ')).toLowerCase().split(/[\s,，。.\-_/]+/).filter(Boolean);
  const candTokens = ((candidate.role || '') + ' ' + (candidate.skills || []).join(' ')).toLowerCase();
  mgrTokens.forEach(t => { if (t.length > 1 && candTokens.includes(t)) s += 1; });
  if (query) {
    const ql = query.toLowerCase();
    if ((candidate.name || '').toLowerCase().includes(ql)) s += 5;
  }
  return s;
}

// 生成 Manager System Prompt 同步补丁
function buildManagerSyncPromptDiff(managerDraft, newMember, mission) {
  if (!managerDraft || !newMember) return null;
  const oldPrompt = managerDraft.systemPrompt || '';
  // 先剥离旧的"## 团队成员补充"段（避免反复追加）
  const STRIPPED = oldPrompt.replace(/\n*## 团队成员补充[\s\S]*$/m, '').replace(/\s+$/, '');

  const others = (mission && mission.squad.agents || []).filter(a => a.id !== managerDraft.id && (managerDraft.teamMemberIds || []).includes(a.id));
  const lines = others.map(o => {
    const skills = (o.skills || []).slice(0, 3).join(' / ') || '通用能力';
    return `- **${o.name}**（${o.role || '团队成员'}）：可在涉及 ${skills} 时调用。`;
  });
  const block = `## 团队成员补充\n团队中已包含以下成员，遇到对应能力相关任务时可委托：\n${lines.join('\n')}`;
  const newPrompt = (STRIPPED ? STRIPPED + '\n\n' : '') + block;

  // 构造 promptDiff：keep STRIPPED + add block 行
  const oldLines = oldPrompt.split('\n');
  const newLines = newPrompt.split('\n');
  // 简化：把整段旧的标记 keep，新增的标记 add
  const keepCount = STRIPPED.split('\n').length;
  const promptDiff = [
    ...newLines.slice(0, keepCount).map((t, idx) => ({ type:'keep', text: oldLines[idx] !== undefined ? oldLines[idx] : t })),
    ...newLines.slice(keepCount).map(t => ({ type:'add', text: t })),
  ];
  // 若旧 prompt 比新 prompt 多（之前有"团队成员补充"段被剥离），把多出来的旧行打成 remove
  if (oldLines.length > keepCount) {
    oldLines.slice(keepCount).forEach(t => promptDiff.push({ type:'remove', text: t }));
  }

  return {
    agentId: managerDraft._agentRefId || (state.detail && state.detail.agentId),
    summary: `同步 Manager 提示词：新增成员 ${newMember.name}`,
    addedSkills: [],
    removedSkills: [],
    promptDiff,
    // 给 openModalAgentDiff 一个完整的目标 prompt，便于直接覆盖
    _newPrompt: newPrompt,
    _isManagerSync: true,
  };
}
